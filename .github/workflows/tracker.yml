name: Telemetry Tracker

on:
  schedule:
    - cron: '0 * * * *'  # Automatically runs every hour on the hour
  workflow_dispatch:     # Keeps manual control open just in case

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Telemetry Sweep
        run: node update_telemetry.js

      - name: Commit and Push Log
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add telemetry.json
          git commit -m "SYS: Automated telemetry update" || exit 0
          git push
