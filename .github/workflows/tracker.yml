name: Telemetry Tracker

on:
  schedule:
    - cron: '*/15 * * * *'  # Cloud execution layer (15-minute fallback interval)
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Telemetry Sweep
        run: node update_telemetry.js

      - name: Commit and Push Log
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add telemetry.json
          # The '|| exit 0' prevents the action from failing if wait times haven't changed
          git commit -m "SYS: Automated telemetry update" || exit 0
          git push
