<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLP Tactical Optimizer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669' } } } }
      }
    </script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #05070a; color: #cbd5e1; -webkit-font-smoothing: antialiased; }
        .route-path-animation { stroke-dasharray: 6 6; animation: dash 3s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -24; } }
        /* Terminal scrollbar styling */
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #05070a; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- INLINE ICONS ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const I = {
            Navigation: '<polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>',
            Database: '<ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>',
            Activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
            BookOpen: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>',
            X: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
            Layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline>',
            ChevronRight: '<polyline points="9 18 15 12 9 6"></polyline>',
            ChevronDown: '<polyline points="6 9 12 15 18 9"></polyline>',
            ChevronUp: '<polyline points="18 15 12 9 6 15"></polyline>',
            Terminal: '<polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>',
            MapIcon: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line>',
            Crosshair: '<circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line>',
            Hourglass: '<path d="M5 22h14"></path><path d="M5 2h14"></path><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"></path><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"></path>',
            Footprints: '<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"></path><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"></path><circle cx="12" cy="10" r="3"></circle>',
            MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle>',
            Target: '<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>',
            ShieldAlert: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>',
            Timer: '<line x1="10" y1="2" x2="14" y2="2"></line><line x1="12" y1="14" x2="15" y2="11"></line><circle cx="12" cy="14" r="8"></circle>',
            TrendingUp: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>',
            TrendingDown: '<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline>',
            Minus: '<line x1="5" y1="12" x2="19" y2="12"></line>',
            RefreshCw: '<polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>',
            CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
            List: '<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>'
        };

        // --- ELITE TARGET REPOSITORY ---
        const PARK_IDS = [
            { id: 4, name: "Disneyland Park", slug: "disneyland-park" },
            { id: 28, name: "Disney Adventure World", slug: "walt-disney-studios" }
        ];

        const PRIORITY_RIDES = [
            "Star Wars Hyperspace Mountain", "Big Thunder Mountain", "The Twilight Zone Tower of Terror",
            "Spider-Man W.E.B. Adventure", "Avengers Assemble: Flight Force", "Ratatouille: The Adventure",
            "Crush's Coaster", "Pirates of the Caribbean", "Indiana Jones and the Temple of Peril",
            "Phantom Manor", "Star Tours: The Adventures Continue", "Peter Pan's Flight", "Buzz Lightyear Laser Blast"
        ];

        const UPTIME_STATS = {
            "big thunder mountain": 0.85, "indiana jones": 0.86, "star wars hyperspace mountain": 0.90,
            "crush's coaster": 0.88, "spider-man w.e.b. adventure": 0.92, "avengers assemble: flight force": 0.89,
            "phantom manor": 0.96, "pirates of the caribbean": 0.95, "peter pan's flight": 0.97, "ratatouille": 0.91
        };

        const TACTICAL_COORDS = {
            4: [
                { match: "main street", x: 50, y: 85, label: "Main St." },
                { match: "fantasy", x: 50, y: 20, label: "Fantasyland" },
                { match: "discovery", x: 85, y: 50, label: "Discoveryland" },
                { match: "adventure", x: 25, y: 35, label: "Adventureland" },
                { match: "frontier", x: 15, y: 65, label: "Frontierland" }
            ],
            28: [
                { match: "front lot", x: 50, y: 85, label: "Front Lot" },
                { match: "production", x: 30, y: 60, label: "Prod. Courtyard" },
                { match: "toon", x: 70, y: 60, label: "Toon Studio" },
                { match: "pixar", x: 80, y: 25, label: "Worlds of Pixar" },
                { match: "avengers", x: 20, y: 30, label: "Avengers Campus" }
            ]
        };

        const getCoords = (parkId, landName) => {
            const mapData = TACTICAL_COORDS[parkId];
            if (!mapData) return { x: 50, y: 50 };
            const coord = mapData.find(c => landName.toLowerCase().includes(c.match));
            return coord || { x: 50, y: 50 };
        };

        const PROXIES = [
            {
                name: "CorsProxy.io (Primary)",
                fetch: async (target) => {
                    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                }
            },
            {
                name: "AllOrigins GET (Fallback)",
                fetch: async (target) => {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    return JSON.parse(data.contents);
                }
            }
        ];

        const App = () => {
            const [rides, setRides] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activePark, setActivePark] = useState('4'); 
            const [lastSync, setLastSync] = useState(null);
            const [showPrimer, setShowPrimer] = useState(false);
            
            // Persistent Storage Layers
            const [completedTargets, setCompletedTargets] = useState(() => {
                return new Set(JSON.parse(localStorage.getItem('dlp_completed_v4') || '[]'));
            });
            
            const [activatedMinors, setActivatedMinors] = useState(() => {
                return new Set(JSON.parse(localStorage.getItem('dlp_activated_v4') || '[]'));
            });

            const [logs, setLogs] = useState([]);
            const [showTerminal, setShowTerminal] = useState(false);
            const logsEndRef = useRef(null);

            const buildHash = useMemo(() => {
                const d = new Date();
                return `BUILD ${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            }, [lastSync]);

            useEffect(() => {
                localStorage.setItem('dlp_completed_v4', JSON.stringify(Array.from(completedTargets)));
            }, [completedTargets]);

            useEffect(() => {
                localStorage.setItem('dlp_activated_v4', JSON.stringify(Array.from(activatedMinors)));
            }, [activatedMinors]);

            const toggleRide = (rideId) => {
                setCompletedTargets(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) {
                        next.delete(rideId);
                        addLog(`[SYS] Objective restored to active tracking sequence.`, 'success');
                    } else {
                        next.add(rideId);
                        addLog(`[SYS] Objective complete. Updating Dynamic Origin vector.`, 'info');
                    }
                    return next;
                });
            };

            const toggleMinor = (rideId) => {
                setActivatedMinors(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) {
                        next.delete(rideId);
                        addLog(`[SYS] Demoting attraction back to the background repository.`, 'info');
                    } else {
                        next.add(rideId);
                        addLog(`[SYS] Promoting attraction into active routing matrix.`, 'success');
                    }
                    return next;
                });
            };

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 3 });
                setLogs(prev => [...prev, { time, msg, type }]);
            };

            useEffect(() => {
                if (showTerminal && logsEndRef.current) {
                    logsEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            }, [logs, showTerminal]);

            const fetchWithCascade = async (targetUrl, description) => {
                addLog(`[NET] Fetching telemetry block for ${description}`, 'info');
                
                for (const proxy of PROXIES) {
                    try {
                        addLog(`[NET] Engaging node: ${proxy.name}...`, 'info');
                        const data = await proxy.fetch(targetUrl);
                        if (data && data.lands) {
                            addLog(`[NET] Success via ${proxy.name}. Payload valid.`, 'success');
                            return data;
                        }
                        throw new Error("Payload corrupt: Missing 'lands' array.");
                    } catch (err) { 
                        addLog(`[WARN] Node failure (${proxy.name}): ${err.message}`, 'warn');
                    }
                }
                
                addLog(`[FATAL] All network nodes exhausted for ${description}.`, 'error');
                throw new Error(`All network nodes exhausted for ${description}.`);
            };

            const bootSystem = async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                setError(null);
                
                addLog(`[SYS] Boot sequence initialized. Silent refresh: ${isSilent}`, 'info');

                try {
                    const allFetchedRides = [];
                    let parksOnline = 0;

                    for (const park of PARK_IDS) {
                        try {
                            const data = await fetchWithCascade(`https://queue-times.com/parks/${park.id}/queue_times.json`, park.name);
                            parksOnline++;
                            
                            let ridesFound = 0;
                            const processed = data.lands.flatMap(land => 
                                land.rides.map(r => {
                                    ridesFound++;
                                    const isPriority = PRIORITY_RIDES.some(top => r.name.toLowerCase().includes(top.toLowerCase()));
                                    return {
                                        ...r, 
                                        parkName: park.name, 
                                        parkId: park.id, 
                                        landName: land.name,
                                        isPriority: isPriority,
                                        isMinor: !isPriority // STRICT MODE: If it's not explicitly elite, it's a minor attraction
                                    };
                                })
                            );
                            addLog(`[SYS] Parsed ${ridesFound} total data layers from ${park.name}`, 'info');
                            allFetchedRides.push(...processed);
                        } catch (e) { 
                            addLog(`[ERR] ${park.name} completely isolated. Connection blocked.`, 'error');
                        }
                    }

                    if (parksOnline === 0 || allFetchedRides.length === 0) {
                        addLog(`[FATAL] Zero operational telemetry returned from endpoint nodes.`, 'error');
                        throw new Error("No operational telemetry returned from endpoint nodes. Check network connection.");
                    }

                    setRides(allFetchedRides);
                    setLastSync(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    addLog(`[SYS] Math engine processing ${allFetchedRides.length} active variables. Routing updated.`, 'success');
                } catch (err) {
                    addLog(`[SYS] Boot failure: ${err.message}`, 'error');
                    if (!isSilent) setError(err.message);
                } finally {
                    if (!isSilent) setLoading(false);
                }
            };

            useEffect(() => {
                bootSystem();
                const syncInterval = setInterval(() => bootSystem(true), 300000); 
                return () => clearInterval(syncInterval);
            }, []);

            const memoizedData = useMemo(() => {
                if (rides.length === 0) return { itinerary: [], masterSequence: [], completedSequence: [], minorSequence: [], metrics: { queueEvasionSaved: 0, walkSaved: 0, totalSavedMins: 0 } };

                const parisTimeStr = new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"});
                const now = new Date(parisTimeStr);
                let t = (now.getHours() * 60 + now.getMinutes()) - 540;
                if (t < 0) t = 0;
                if (t > 720) t = 720; 
                const R = 200 + 200 * Math.sin((t * Math.PI) / 720); 

                const completedSequence = [];
                const minorSequence = [];
                const activePool = [];

                rides.forEach(r => {
                    const matchPark = activePark === 'all' || r.parkId === parseInt(activePark);
                    if (!matchPark) return;

                    if (completedTargets.has(r.id)) {
                        completedSequence.push(r);
                    } else if (r.isMinor && !activatedMinors.has(r.id)) {
                        minorSequence.push(r);
                    } else {
                        activePool.push(r);
                    }
                });

                minorSequence.sort((a, b) => a.name.localeCompare(b.name));
                completedSequence.sort((a, b) => a.name.localeCompare(b.name));

                const grouped = {};
                activePool.forEach(ride => {
                    const zoneKey = `${ride.parkName} - ${ride.landName}`;
                    if (!grouped[zoneKey]) {
                        grouped[zoneKey] = {
                            zoneKey, parkId: ride.parkId, parkName: ride.parkName, landName: ride.landName, rides: [], avgScore: 0
                        };
                    }
                    
                    let mu_base = 20; 
                    const rideNameLower = ride.name.toLowerCase();
                    if (rideNameLower.includes('phantom manor') || rideNameLower.includes('pirates') || rideNameLower.includes('buzz') || rideNameLower.includes('star tours') || rideNameLower.includes('small world')) mu_base = 33; 
                    else if (rideNameLower.includes('crush') || rideNameLower.includes('peter pan') || rideNameLower.includes('parachutes') || rideNameLower.includes('rc racer')) mu_base = 13; 
                    else if (rideNameLower.includes('thunder') || rideNameLower.includes('hyperspace') || rideNameLower.includes('avengers')) mu_base = 25; 

                    const Ar = Object.keys(UPTIME_STATS).find(key => rideNameLower.includes(key)) 
                               ? UPTIME_STATS[Object.keys(UPTIME_STATS).find(key => rideNameLower.includes(key))] : 0.98;
                    
                    const mu_standby_raw = ride.isPriority ? mu_base * 0.6 : mu_base; 
                    const mu_eff = mu_standby_raw * Ar;
                    
                    const baseAttraction = ride.isPriority ? 0.08 : 0.04;
                    const repulsion = baseAttraction / 150; 
                    const lambda = Math.max(0, R * (baseAttraction - (repulsion * ride.wait_time))); 
                    
                    const rho = mu_eff > 0 ? lambda / mu_eff : 0;
                    const velocity = rho - 1; 
                    const predictedWait = Math.max(0, ride.wait_time + (velocity * 60));
                    
                    const benefitOfRidingNow = predictedWait - ride.wait_time;
                    ride.routingScore = ride.wait_time - benefitOfRidingNow;
                    
                    ride.velocity = velocity;
                    ride.predictedWait = Math.round(predictedWait);
                    ride.lambda = lambda;
                    ride.mu = mu_eff;
                    ride.rho = rho;
                    ride.uptime = Ar; 

                    grouped[zoneKey].rides.push(ride);
                });

                Object.values(grouped).forEach(zone => {
                    zone.rides.sort((a, b) => a.routingScore - b.routingScore);
                    const totalScore = zone.rides.reduce((sum, r) => sum + r.routingScore, 0);
                    zone.avgScore = totalScore / zone.rides.length;
                });

                let tspSortedLands = [];
                const parkGroups = {};
                Object.values(grouped).forEach(z => {
                   if(!parkGroups[z.parkId]) parkGroups[z.parkId] = [];
                   parkGroups[z.parkId].push(z);
                });

                // DYNAMIC ORIGIN MATRIX CALCULATOR
                Object.keys(parkGroups).forEach(pId => {
                   let unvisited = parkGroups[pId];
                   let currentPos = { x: 50, y: 95 }; // Baseline entry gates
                   
                   // Scans back in time to lock location to the last ride you checked off
                   const completedArray = Array.from(completedTargets);
                   for (let i = completedArray.length - 1; i >= 0; i--) {
                       const lastId = completedArray[i];
                       const lastRide = rides.find(r => r.id === lastId);
                       if (lastRide && lastRide.parkId.toString() === pId) {
                           currentPos = getCoords(pId, lastRide.landName);
                           break; 
                       }
                   }

                   while(unvisited.length > 0) {
                      unvisited.forEach(zone => {
                         const dest = getCoords(pId, zone.landName);
                         const physicalDistance = Math.sqrt(Math.pow(dest.x - currentPos.x, 2) + Math.pow(dest.y - currentPos.y, 2));
                         const travelTimeMins = Math.max(2, Math.round(physicalDistance * 0.15)); 
                         
                         zone.travelTimeFromLast = travelTimeMins;
                         zone.tspCostScore = zone.avgScore + (travelTimeMins * 1.5); 
                         zone.coords = dest;
                      });
                      
                      unvisited.sort((a,b) => a.tspCostScore - b.tspCostScore);
                      const nextZone = unvisited.shift();
                      
                      tspSortedLands.push(nextZone);
                      currentPos = nextZone.coords; 
                   }
                });

                let sequence = [];
                let counter = 1;
                let tspTotalWalk = 0;
                let queueEvasionSaved = 0;

                tspSortedLands.forEach(zone => {
                    tspTotalWalk += (zone.travelTimeFromLast || 0);
                    zone.rides.forEach(ride => {
                        sequence.push({ ...ride, globalStep: counter++, zoneInfo: zone });
                        if (ride.velocity > 0) {
                           queueEvasionSaved += Math.round(ride.predictedWait - ride.wait_time);
                        }
                    });
                });

                let walkSaved = Math.round(tspTotalWalk * 0.8);
                let totalSavedMins = walkSaved + queueEvasionSaved;

                return { 
                    itinerary: tspSortedLands, 
                    masterSequence: sequence,
                    completedSequence,
                    minorSequence,
                    metrics: { queueEvasionSaved, walkSaved, totalSavedMins }
                };
            }, [rides, activePark, completedTargets, activatedMinors]);

            const { itinerary, masterSequence, completedSequence, minorSequence, metrics } = memoizedData;

            const TacticalMap = () => {
                if (activePark === 'all') {
                    return (
                        <div className="h-48 w-full bg-[#080b12] rounded-xl border border-slate-800 flex items-center justify-center p-4 text-center shadow-inner">
                            <p className="text-xs text-slate-500 font-mono flex flex-col items-center gap-2">
                                <Icon path={I.Crosshair} size={20} className="text-slate-600 animate-pulse" />
                                Tactical Map requires a specific Sector.<br/>Please select a single park.
                            </p>
                        </div>
                    );
                }

                const mapData = TACTICAL_COORDS[activePark];
                const parkItinerary = itinerary.filter(zone => zone.parkId.toString() === activePark);

                const routePoints = parkItinerary.map((zone, idx) => {
                    const coord = mapData.find(c => zone.landName.toLowerCase().includes(c.match));
                    return coord ? { ...coord, step: idx + 1, originalZone: zone } : null;
                }).filter(Boolean);

                return (
                    <div className="relative w-full aspect-[4/3] bg-[#05070a] rounded-xl border border-slate-800 overflow-hidden shadow-inner group">
                        <div className="absolute inset-0 opacity-20 pointer-events-none" 
                             style={{ backgroundImage: 'linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                        </div>
                        
                        <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                            {routePoints.map((point, idx) => {
                                if (idx === routePoints.length - 1) return null;
                                const nextPoint = routePoints[idx + 1];
                                return (
                                    <g key={`line-${idx}`}>
                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} stroke="#334155" strokeWidth="2" />
                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} stroke="#10b981" strokeWidth="2" className="route-path-animation" />
                                    </g>
                                );
                            })}
                        </svg>

                        {mapData.map((node, i) => {
                            const isActivePoint = routePoints.find(p => p.match === node.match);
                            return (
                                <div key={`node-${i}`} className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style={{ left: `${node.x}%`, top: `${node.y}%` }}>
                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center font-black text-xs z-10 transition-all duration-500 shadow-lg ${
                                        isActivePoint ? 'bg-emerald-500 border-emerald-300 text-black scale-110 shadow-[0_0_15px_rgba(16,185,129,0.5)]' : 'bg-[#0f172a] border-slate-700 text-slate-600 scale-90'
                                    }`}>
                                        {isActivePoint ? isActivePoint.step : '•'}
                                    </div>
                                    <span className={`mt-1 text-[8px] uppercase tracking-wider font-bold bg-[#05070a]/80 px-1 rounded ${isActivePoint ? 'text-emerald-400' : 'text-slate-600'}`}>
                                        {node.label}
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-[#05070a] text-slate-300 font-sans p-4 md:p-8 flex flex-col items-center pb-32">
                    <div className="w-full max-w-6xl">
                        
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-l-4 border-emerald-500 pl-6 py-2 bg-emerald-500/5 rounded-r-xl">
                            <div>
                                <h1 className="text-3xl font-black text-white tracking-tighter flex items-center gap-2">
                                    <Icon path={I.Navigation} size={32} className="text-emerald-500 animate-pulse" />
                                    DLP TOURING PLAN <span className="text-emerald-500/50 text-sm font-mono">{buildHash}</span>
                                </h1>
                                <p className="text-xs font-mono text-emerald-400 uppercase tracking-widest mt-1">
                                    Unified Queue Logistics Engine
                                </p>
                            </div>
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => bootSystem(true)}
                                    className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-2 rounded-lg font-bold text-xs transition-all border border-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.2)]"
                                >
                                    <Icon path={I.RefreshCw} size={14} /> MANUAL SYNC
                                </button>
                                <button 
                                    onClick={() => setShowPrimer(!showPrimer)}
                                    className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded-lg font-bold text-xs transition-all border border-slate-700"
                                >
                                    <Icon path={I.BookOpen} size={14} /> {showPrimer ? 'HIDE' : 'PRIMER'}
                                </button>
                                <div className="flex flex-col items-end hidden sm:flex">
                                    {lastSync && <span className="text-[10px] font-mono text-slate-500">LAST SYNC: {lastSync}</span>}
                                    <span className="text-[8px] font-mono text-emerald-600 flex items-center gap-1">
                                         <Icon path={I.Activity} size={8} className="animate-pulse" /> AUTO-LINK (300s)
                                    </span>
                                </div>
                            </div>
                        </header>

                        {showPrimer && (
                            <div className="mb-6 bg-[#0c111a] border border-emerald-500/30 rounded-2xl p-6 shadow-xl animate-in fade-in slide-in-from-top-4">
                                <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                                     <h2 className="text-sm font-black text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                                         <Icon path={I.Database} size={16} /> Reading the HUD Analytics
                                     </h2>
                                     <button onClick={() => setShowPrimer(false)} className="text-slate-500 hover:text-white"><Icon path={I.X} size={16} /></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                                    <div className="space-y-4">
                                        <p className="text-slate-300 leading-relaxed">
                                            The system maps the <strong>velocity</strong> of lines to calculate <em>Opportunity Cost</em>. It logically groups rides by land to minimize your physical walking exhaustion across the park.
                                        </p>
                                        <div className="bg-[#05070a] p-3 rounded-xl border border-slate-800 font-mono text-[10px] space-y-2">
                                            <div className="flex justify-between border-b border-slate-800 pb-1"><span className="text-slate-400">λ (Lambda)</span><span className="text-white">People joining queue per min</span></div>
                                            <div className="flex justify-between border-b border-slate-800 pb-1"><span className="text-slate-400">Ar (Availability)</span><span className="text-white">Historical uptime %</span></div>
                                            <div className="flex justify-between border-b border-slate-800 pb-1"><span className="text-slate-400">μ (Mu)</span><span className="text-white">Effective hardware capacity/min</span></div>
                                            <div className="flex justify-between border-b border-slate-800 pb-1"><span className="text-slate-400">ρ (Rho)</span><span className="text-white">Ratio of λ / μ (Danger metric)</span></div>
                                            <div className="flex justify-between"><span className="text-slate-400">PRED</span><span className="text-white">Velocity Forecast in 60 mins</span></div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <h3 className="text-xs font-bold text-white uppercase tracking-wider text-emerald-500">How to read ρ (Traffic Intensity)</h3>
                                        <ul className="space-y-2 text-xs text-slate-300 mb-4">
                                            <li><span className="text-emerald-400 font-bold font-mono">ρ &lt; 1.0</span> <strong>Green:</strong> Queue shrinking. Safe to delay.</li>
                                            <li><span className="text-rose-400 font-bold font-mono">ρ &gt; 1.0</span> <strong>Red:</strong> Queue expanding. Explosion imminent.</li>
                                        </ul>
                                        <h3 className="text-xs font-bold text-white uppercase tracking-wider text-emerald-500 border-t border-slate-800 pt-3">How to read PRED (Forecast)</h3>
                                        <ul className="space-y-2 text-xs text-slate-300">
                                            <li className="flex items-center gap-2"><Icon path={I.TrendingUp} size={14} className="text-rose-400" /> High Opportunity Cost. Route here immediately.</li>
                                            <li className="flex items-center gap-2"><Icon path={I.TrendingDown} size={14} className="text-emerald-400" /> Queue naturally shrinking. Delay.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-[#0c111a] border border-slate-800 rounded-2xl p-5 shadow-xl">
                                    <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                        <Icon path={I.Layers} size={12} /> Zone Selection
                                    </h2>
                                    <div className="grid grid-cols-1 gap-2">
                                        {[
                                            { id: '4', label: 'Disneyland Park' },
                                            { id: '28', label: 'Disney Adventure World' },
                                            { id: 'all', label: 'Full Resort' }
                                        ].map(p => (
                                            <button
                                                key={p.id}
                                                onClick={() => setActivePark(p.id)}
                                                className={`text-left px-4 py-2 rounded-xl text-xs font-bold transition-all border flex justify-between items-center ${
                                                    activePark === p.id ? 'bg-emerald-600 border-emerald-400 text-white shadow-[0_0_10px_rgba(16,185,129,0.3)]' : 'bg-slate-900/50 border-slate-800 hover:border-slate-700'
                                                }`}
                                            >
                                                {p.label}
                                                {activePark === p.id && <Icon path={I.ChevronRight} size={14} />}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-[#0c111a] border border-slate-800 rounded-2xl p-3 shadow-xl hidden md:block">
                                     <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-2 flex items-center gap-2">
                                        <Icon path={I.MapIcon} size={12} /> Live Route Map
                                    </h2>
                                    <TacticalMap />
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                {loading ? (
                                    <div className="flex flex-col items-center justify-center py-24 bg-[#0c111a] border border-slate-800 rounded-3xl">
                                        <Icon path={I.Database} size={40} className="text-emerald-500 animate-bounce mb-4" />
                                        <p className="text-white font-bold tracking-widest animate-pulse uppercase text-xs">Parsing Topological Data...</p>
                                    </div>
                                ) : error ? (
                                    <div className="bg-red-900/20 border border-red-500/50 rounded-3xl p-10 text-center">
                                        <Icon path={I.ShieldAlert} size={48} className="mx-auto text-red-500 mb-4" />
                                        <p className="text-red-300 text-sm">{error}</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        
                                        {masterSequence.length > 0 && (
                                            <div className="bg-[#0c111a] border-l-4 border-emerald-500 rounded-r-2xl p-4 shadow-lg flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                                                <div className="flex items-center gap-3">
                                                    <div className="p-3 bg-emerald-500/10 rounded-xl text-emerald-400 border border-emerald-500/20">
                                                        <Icon path={I.Hourglass} size={24} className="animate-pulse" />
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-0.5">Projected Efficiency Gain</p>
                                                        <h3 className="text-2xl font-black text-white flex items-baseline gap-1">
                                                            {Math.floor(metrics.totalSavedMins / 60)}<span className="text-sm text-emerald-500">H</span> {metrics.totalSavedMins % 60}<span className="text-sm text-emerald-500">M</span>
                                                        </h3>
                                                    </div>
                                                </div>
                                                <div className="text-right text-[10px] font-mono text-slate-400 space-y-1 bg-[#05070a] p-2 rounded-lg border border-slate-800 w-full sm:w-auto">
                                                    <div className="flex justify-between sm:justify-end gap-4">
                                                        <span>QUEUE EVASION:</span>
                                                        <span className="text-emerald-400 font-bold">+{metrics.queueEvasionSaved}m</span>
                                                    </div>
                                                    <div className="flex justify-between sm:justify-end gap-4">
                                                        <span>TSP ROUTING:</span>
                                                        <span className="text-emerald-400 font-bold">+{metrics.walkSaved}m</span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex justify-between items-end px-2 mb-2 border-b border-slate-800 pb-2">
                                            <h2 className="text-xl font-black text-white tracking-tight">MASTER SEQUENCE</h2>
                                            <span className="text-xs font-mono text-emerald-500">{masterSequence.length} OBJECTIVES</span>
                                        </div>

                                        {masterSequence.length === 0 ? (
                                            <div className="p-8 bg-[#0c111a] border border-dashed border-slate-800 rounded-2xl text-center text-slate-500 text-sm flex flex-col items-center my-8">
                                                 <Icon path={I.Activity} size={32} className="text-emerald-500 mb-3 opacity-50" />
                                                 <p className="font-bold text-white mb-1">Queue Empty</p>
                                                 <p>All active elite objectives have been logged.<br/>Untick items in the optional bank below to route secondary targets.</p>
                                             </div>
                                        ) : (
                                            <div className="relative border-l-2 border-slate-800 ml-6 space-y-6 pb-8 mt-4">
                                                {itinerary.map((zone, zoneIdx) => (
                                                    <div key={`${zone.parkId}-${zone.landName}`} className="relative">
                                                        
                                                        {zoneIdx > 0 && (
                                                             <div className="absolute -left-[45px] -top-10 h-10 border-l-2 border-dashed border-emerald-500/30"></div>
                                                        )}

                                                        <div className="absolute -left-[64px] -top-8 bg-[#0c111a] border border-slate-700 rounded-full px-2 py-1 flex items-center gap-1 text-[9px] font-bold text-slate-400 z-10 shadow-lg">
                                                            <Icon path={I.Footprints} size={10} className="text-emerald-500" /> Walk: ~{zone.travelTimeFromLast}m
                                                        </div>
                                                        
                                                        <div className="absolute -left-[21px] top-0 bg-[#05070a] py-1 z-10">
                                                            <div className="w-10 h-10 rounded-full bg-[#111827] border-2 border-slate-700 flex items-center justify-center">
                                                                <Icon path={I.MapPin} size={16} className="text-slate-500" />
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="ml-10 mb-4 mt-2">
                                                            <h3 className="font-black text-slate-300 uppercase tracking-widest text-sm flex items-center gap-2">
                                                                ENTER {zone.landName}
                                                            </h3>
                                                            <p className="text-[9px] font-mono text-slate-600 uppercase">{zone.parkName}</p>
                                                        </div>

                                                        <div className="space-y-3 ml-8">
                                                            {masterSequence.filter(r => r.landName === zone.landName && r.parkId === zone.parkId).map((ride) => (
                                                                <div 
                                                                    key={ride.id} 
                                                                    className={`flex items-center p-3 rounded-xl transition-all group relative ${
                                                                        ride.isPriority ? 'bg-emerald-900/10 border border-emerald-500/20 hover:border-emerald-500/50' : 'bg-[#0c111a] border border-slate-800 hover:border-slate-600'
                                                                    }`}
                                                                >
                                                                    <div className="absolute -left-8 top-1/2 w-8 h-[2px] bg-slate-800 group-hover:bg-emerald-500/50 transition-colors z-0"></div>

                                                                    <div className={`absolute -left-[45px] top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-lg transition-all z-10 ${
                                                                        ride.isPriority ? 'bg-emerald-500 text-black border-2 border-[#05070a] scale-110 shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'bg-slate-800 text-slate-300 border-2 border-[#05070a]'
                                                                    }`}>
                                                                        {ride.globalStep}
                                                                    </div>

                                                                    <div className="mr-3 flex shrink-0">
                                                                        <input 
                                                                            type="checkbox" 
                                                                            checked={completedTargets.has(ride.id)} 
                                                                            onChange={() => toggleRide(ride.id)}
                                                                            className="w-5 h-5 accent-emerald-500 rounded border-slate-700 bg-slate-800 cursor-pointer" 
                                                                        />
                                                                    </div>

                                                                    <div className="ml-2 flex-grow">
                                                                        <div className="flex items-center gap-2">
                                                                            <h4 className={`text-sm font-bold leading-tight ${ride.isPriority ? 'text-emerald-50' : 'text-slate-200 group-hover:text-white'}`}>
                                                                                {ride.name}
                                                                            </h4>
                                                                        </div>
                                                                        {ride.isPriority && (
                                                                            <span className="inline-flex items-center gap-1 mt-1 text-[8px] font-black bg-emerald-500/20 text-emerald-400 px-1.5 py-0.5 rounded uppercase tracking-wider">
                                                                                <Icon path={I.Target} size={8} /> Priority Target
                                                                            </span>
                                                                        )}
                                                                        
                                                                        <div className="flex flex-col gap-1 mt-2">
                                                                            <div className="flex flex-wrap items-center gap-2 md:gap-3 text-[8px] font-mono text-slate-500 bg-[#05070a] px-2 py-1.5 rounded border border-slate-800/50 w-fit shadow-inner">
                                                                                <span title="Arrival Rate (People joining per min)">λ: {ride.lambda.toFixed(1)}/m</span>
                                                                                <span className="text-slate-700">|</span>
                                                                                <span title="Effective Capacity (Throughput × Uptime)">μ: {ride.mu.toFixed(1)}/m</span>
                                                                                <span className="text-slate-700">|</span>
                                                                                <span title="Traffic Intensity (Arrivals / Capacity)" className={ride.rho > 1.0 ? 'text-rose-400 font-bold bg-rose-500/10 px-1 rounded' : 'text-emerald-400 font-bold bg-emerald-500/10 px-1 rounded'}>
                                                                                    ρ: {ride.rho.toFixed(2)}
                                                                                </span>
                                                                            </div>
                                                                            
                                                                            {ride.uptime < 0.95 && (
                                                                                <div className="flex items-center gap-1 text-[8px] font-mono text-amber-500 bg-amber-500/10 px-2 py-1 rounded border border-amber-500/20 w-fit">
                                                                                    <Icon path={I.ShieldAlert} size={8} /> HISTORICAL UPTIME: {(ride.uptime * 100).toFixed(0)}% (BREAKDOWN RISK)
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>

                                                                    <div className="flex flex-col items-end justify-center shrink-0 ml-4 bg-[#05070a] px-3 py-2 rounded-lg border border-slate-800/50 shadow-inner">
                                                                        <div className="flex items-center gap-1 text-right mb-0.5">
                                                                            <div className={`font-black text-lg flex items-center gap-1 ${ride.wait_time <= 30 ? 'text-emerald-400' : ride.wait_time <= 60 ? 'text-amber-400' : 'text-rose-500'}`}>
                                                                                <Icon path={I.Timer} size={14} /> {ride.wait_time}
                                                                            </div>
                                                                            <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter w-4">MIN</span>
                                                                        </div>
                                                                        
                                                                        <div className={`text-[9px] flex items-center gap-0.5 font-mono font-bold ${ride.velocity > 0.1 ? 'text-rose-400' : ride.velocity < -0.1 ? 'text-emerald-400' : 'text-slate-400'}`}>
                                                                            {ride.velocity > 0.1 ? <Icon path={I.TrendingUp} size={10} /> : ride.velocity < -0.1 ? <Icon path={I.TrendingDown} size={10} /> : <Icon path={I.Minus} size={10} />}
                                                                            PRED: {ride.predictedWait}m
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* COMPLETED OBJECTIVES ZONE */}
                                        {completedSequence.length > 0 && (
                                            <div className="mt-8 border-t border-slate-800 pt-6">
                                                <div className="flex items-center gap-2 mb-4 px-2">
                                                    <Icon path={I.CheckCircle} size={18} className="text-slate-500" />
                                                    <h2 className="text-sm font-black text-slate-500 uppercase tracking-widest">Completed Objectives</h2>
                                                    <span className="text-xs font-mono text-slate-600 bg-[#05070a] px-2 py-0.5 rounded border border-slate-800 ml-auto">
                                                        {completedSequence.length} LOGGED
                                                    </span>
                                                </div>
                                                
                                                <div className="space-y-2 px-2 opacity-50">
                                                    {completedSequence.map((ride) => (
                                                        <div key={ride.id} className="flex items-center p-3 rounded-xl bg-[#080b12] border border-slate-800 transition-colors hover:bg-[#0c111a]">
                                                            <div className="mr-3 flex shrink-0">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={true}
                                                                    onChange={() => toggleRide(ride.id)}
                                                                    className="w-5 h-5 accent-emerald-500 rounded border-slate-700 bg-slate-800 cursor-pointer" 
                                                                />
                                                            </div>
                                                            <div className="flex-grow">
                                                                <h4 className="text-sm font-bold text-slate-500 line-through decoration-slate-600">{ride.name}</h4>
                                                                <p className="text-[9px] font-mono text-slate-600 uppercase">{ride.parkName} - {ride.landName}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* ALL OTHER ATTRACTIONS (OPTIONAL) ZONE */}
                                        {minorSequence.length > 0 && (
                                            <div className="mt-8 border-t border-slate-800 pt-6">
                                                <div className="flex items-center gap-2 mb-4 px-2">
                                                    <Icon path={I.List} size={18} className="text-slate-500" />
                                                    <h2 className="text-sm font-black text-slate-500 uppercase tracking-widest">All Other Attractions (Optional)</h2>
                                                    <span className="text-xs font-mono text-slate-600 bg-[#05070a] px-2 py-0.5 rounded border border-slate-800 ml-auto">
                                                        {minorSequence.length} HIDDEN
                                                    </span>
                                                </div>
                                                
                                                <div className="space-y-2 px-2 opacity-60">
                                                    {minorSequence.map((ride) => (
                                                        <div key={ride.id} className="flex items-center p-3 rounded-xl bg-[#080b12] border border-slate-800 transition-colors hover:opacity-100 hover:bg-[#0c111a]">
                                                            <div className="mr-3 flex shrink-0">
                                                                <input 
                                                                    type="checkbox" 
                                                                    checked={!activatedMinors.has(ride.id)}
                                                                    onChange={() => toggleMinor(ride.id)}
                                                                    className="w-5 h-5 accent-slate-600 rounded border-slate-700 bg-slate-800 cursor-pointer" 
                                                                />
                                                            </div>
                                                            <div className="flex-grow">
                                                                <h4 className="text-sm font-bold text-slate-400">{ride.name}</h4>
                                                                <p className="text-[9px] font-mono text-slate-600 uppercase">{ride.parkName} - {ride.landName}</p>
                                                            </div>
                                                            <div className="shrink-0 text-right font-mono text-[10px] font-bold">
                                                                {ride.is_open ? (
                                                                    <span className="text-slate-400">{ride.wait_time} MIN</span>
                                                                ) : (
                                                                    <span className="text-rose-500">CLOSED</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                )}
                            </div>
                        </div>

                        {/* --- TERMINAL LOG VIEWER --- */}
                        <div className="mt-12 border border-slate-800 rounded-xl bg-[#0c111a] overflow-hidden shadow-xl mb-8">
                            <button 
                                onClick={() => setShowTerminal(!showTerminal)}
                                className="w-full flex items-center justify-between p-3 bg-slate-900/50 hover:bg-slate-800 transition-colors text-[10px] font-bold text-slate-400 uppercase tracking-widest"
                            >
                                <div className="flex items-center gap-2">
                                    <Icon path={I.Terminal} size={14} className="text-emerald-500" /> System Network Logs
                                </div>
                                <Icon path={showTerminal ? I.ChevronUp : I.ChevronDown} size={14} />
                            </button>
                            
                            {showTerminal && (
                                <div className="p-4 bg-[#020408] h-64 overflow-y-auto font-mono text-[10px] space-y-1.5 terminal-scroll">
                                    {logs.length === 0 ? (
                                        <p className="text-slate-600 italic">Initializing network daemon...</p>
                                    ) : (
                                        logs.map((log, i) => (
                                            <div key={i} className="flex items-start gap-3">
                                                <span className="text-slate-600 shrink-0">[{log.time}]</span>
                                                <span className={`
                                                    ${log.type === 'info' ? 'text-blue-400' : ''}
                                                    ${log.type === 'success' ? 'text-emerald-400' : ''}
                                                    ${log.type === 'warn' ? 'text-amber-400' : ''}
                                                    ${log.type === 'error' ? 'text-rose-500 font-bold' : ''}
                                                `}>
                                                    {log.msg}
                                                </span>
                                            </div>
                                        ))
                                    )}
                                    <div ref={logsEndRef} />
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
