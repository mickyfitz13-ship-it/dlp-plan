        const getCoords = (parkId, landName) => {
            const mapData = TACTICAL_COORDS[parkId];
            if (!mapData) return { x: 50, y: 50 };
            const safeLand = landName ? landName.toLowerCase() : "";
            const coord = mapData.find(c => safeLand.includes(c.match));
            return coord || { x: 50, y: 50 };
        };

        const getHaversineDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        };

        const generateTacticalIntelligence = (ride) => {
            const n = ride.name.toLowerCase();
            let brief = "Standard objective. Normal operational protocols apply.";
            let type = "Standard Ride";
            let env = "Mixed Architecture";
            let tags = ["All Ages"];

            if (n.includes("mountain") || n.includes("coaster") || n.includes("flight force") || n.includes("indiana") || n.includes("tron") || n.includes("test track") || n.includes("tower of terror")) {
                brief = "High-velocity kinetic experience. Endorphin spike expected. Secure all loose equipment prior to launch.";
                type = n.includes("tower") ? "Drop tower" : "Thrill / High-G";
                env = "Dynamic / Outdoor Track";
                tags = ["Thrill", "High Intensity"];
                if (n.includes("tower")) { env = "Indoor"; tags = ["Thrill", "Drop tower"]; }
            } else if (n.includes("phantom") || n.includes("mansion") || n.includes("journey")) {
                brief = "Atmospheric and psychological simulation. Low-light environment navigation required.";
                type = "Dark Ride";
                env = "Climate-Controlled Indoors";
                tags = ["Family", "Dark Ride"];
            } else if (n.includes("peter pan") || n.includes("ratatouille") || n.includes("crush") || n.includes("resistance") || n.includes("beauty and the beast") || n.includes("frozen")) {
                brief = "High-value narrative track. Heavy civilian foot-traffic expected in this sector.";
                type = "Scenic / Tracked";
                env = "Immersive Indoors";
                tags = ["Family", "Story Driven"];
            } else if (n.includes("pirates") || n.includes("small world") || n.includes("buzz") || n.includes("star tours") || n.includes("mermaid")) {
                brief = "High-capacity continuous-load system. Rapid troop movement through the facility.";
                type = "Omnimover / Boat";
                env = "Massive Indoor Show Building";
                tags = ["Family", "High Capacity"];
            } else if (ride.isMinor) {
                brief = "Secondary atmospheric objective. Ideal for operational cooldown and stamina recovery.";
                type = "Leisure / Viewing";
                env = "General Architecture";
                tags = ["Relaxing"];
            }
            return { brief, type, env, tags };
        };

        const fetchWithTimeout = async (url, timeout = 10000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.text(); 
            } catch (e) {
                clearTimeout(id);
                throw e;
            }
        };

            useEffect(() => {

                const root = window.document.documentElement;
                if (theme === 'dark') root.classList.add('dark');
                else if (theme === 'light') root.classList.remove('dark');
                else window.matchMedia('(prefers-color-scheme: dark)').matches ? root.classList.add('dark') : root.classList.remove('dark');
            }, [theme]);

            const cycleTheme = () => {
                if (theme === 'system') setTheme('dark');
                else if (theme === 'dark') setTheme('light');
                else setTheme('system');
            };

            const [gpsEnabled, setGpsEnabled] = useState(() => JSON.parse(localStorage.getItem('dlp_gps_v18') || 'false'));
            const [userGPS, setUserGPS] = useState(null);

            useEffect(() => {
                localStorage.setItem('dlp_gps_v18', JSON.stringify(gpsEnabled));
                let watchId;
                if (gpsEnabled) {
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserGPS({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => addLog(`[WARN] GPS Signal lost or denied: ${err.message}`, 'warn'),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                    addLog(`[SYS] Satellite Tracking active. Syncing Dynamic Origin.`, 'success');
                } else {
                    setUserGPS(null);
                    addLog(`[SYS] Satellite Tracking offline. Reverting to manual sequencing.`, 'info');
                }
                return () => { if(watchId) navigator.geolocation.clearWatch(watchId); };
            }, [gpsEnabled]);

            const toggleGPS = () => setGpsEnabled(!gpsEnabled);

            const [completedTargets, setCompletedTargets] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_completed_v18') || '[]')));
            const [activatedMinors, setActivatedMinors] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_activated_v18') || '[]')));
            const [logs, setLogs] = useState([]);
            const [showTerminal, setShowTerminal] = useState(false);
            const logsEndRef = useRef(null);

                const d = new Date();
                return `BUILD ${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            }, [lastSync]);

            useEffect(() => localStorage.setItem('dlp_completed_v18', JSON.stringify(Array.from(completedTargets))), [completedTargets]);
            useEffect(() => localStorage.setItem('dlp_activated_v18', JSON.stringify(Array.from(activatedMinors))), [activatedMinors]);

                setActiveRegion(newRegion);

            };

                e.stopPropagation(); 
                setCompletedTargets(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) { next.delete(rideId); addLog(`[SYS] Objective restored to active sequence.`, 'success'); } 
                    else { next.add(rideId); addLog(`[SYS] Objective complete. Updating Dynamic Origin vector.`, 'info'); }
                    return next;
                });
            };

                e.stopPropagation(); 
                setActivatedMinors(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) { next.delete(rideId); addLog(`[SYS] Demoting attraction back to the background repository.`, 'info'); } 
                    else { next.add(rideId); addLog(`[SYS] Promoting attraction into active routing matrix.`, 'success'); }
                    return next;
                });
            };

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 3 });
                setLogs(prev => [...prev, { time, msg, type }]);
            };

            const fetchBackgroundLogs = async () => {
                try {
                    const res = await fetch('./telemetry.json?v=' + Date.now()); 
                    if (res.ok) {
                        const parsedLog = await res.json();
                        setGlobalTelemetryLog(parsedLog);
                        addLog(`[SYS] Verified GitHub Telemetry Repository integrated.`, 'success');
                        return parsedLog;
                    }
                } catch(e) {
                    addLog(`[WARN] No telemetry file found yet. Awaiting cron sweep.`, 'warn');
                }
                return {};
            };

            const bootSystem = async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                setError(null);
                addLog(`[SYS] Boot sequence initialized for ${activeRegion}. Live Data Engine active.`, 'info');

                try {
                    const activeLogs = await fetchBackgroundLogs();
                    
                    const allFetchedRides = [];
                    let parksOnline = 0;
                    const CURRENT_PARKS = GLOBAL_PARKS[activeRegion];
                    const now = Date.now();

                    for (const park of CURRENT_PARKS) {
                        try {
                            let data = null;
                            for (const proxy of PROXIES) {
                                try {
                                    addLog(`[NET] Engaging node: ${proxy.name} for ${park.name}...`, 'info');
                                    data = await proxy.fetch(`https://queue-times.com/parks/${park.id}/queue_times.json`);
                                    if (data && (data.lands || data.rides)) break; 
                                    if (data && data.contents) { data = JSON.parse(data.contents); break; }
                                } catch(e) { addLog(`[WARN] Node timeout/failure: ${e.message}`, 'warn'); }
                            }
                            if (!data || (!data.lands && !data.rides)) throw new Error("All network nodes isolated.");
                            
                            let minsToClose = 999;
                            try {
                                const scheduleData = await fetchWithTimeout(`https://api.themeparks.wiki/v1/entity/${park.tpUuid}/schedule`);
                                const scheduleJson = JSON.parse(scheduleData);
                                if (scheduleJson && scheduleJson.schedule) {
                                    const activeSchedule = scheduleJson.schedule.find(s => s.type === "OPERATING" && new Date(s.closingTime).getTime() > now);
                                    if (activeSchedule) {
                                        minsToClose = (new Date(activeSchedule.closingTime).getTime() - now) / 60000;
                                    } else {
                                        minsToClose = -1; 
                                    }
                                }
                            } catch(e) { addLog(`[WARN] Schedule extraction timeout.`, 'warn'); }

                            parksOnline++;
                            let rawRides = [];
                            
                            if (data.lands) {
                                data.lands.forEach(land => {
                                    if (land.rides) {
                                        land.rides.forEach(r => rawRides.push({ ...r, landName: land.name }));
                                    }
                                });
                            }
                            if (data.rides) {
                                data.rides.forEach(r => rawRides.push({ ...r, landName: 'Park Grounds' }));
                            }
                            
                            const processed = rawRides
                                .filter(r => r.name && !r.name.toLowerCase().includes('single rider'))
                                .map(r => {
                                    const isPriority = PRIORITY_RIDES.some(top => r.name.toLowerCase().includes(top.toLowerCase()));
                                    const coords = getCoords(park.id, r.landName);
                                    return {
                                        ...r, 
                                        parkName: park.name, 
                                        parkId: park.id, 
                                        isPriority: isPriority,
                                        isMinor: !isPriority,
                                        coords: { x: coords.x, y: coords.y },
                                        duration: isPriority ? 5 : 3,
                                        uptime: 0.95,
                                        minsToClose: minsToClose
                                    };
                                });
                            allFetchedRides.push(...processed);
                        } catch (e) { addLog(`[ERR] ${park.name} completely isolated.`, 'error'); }
                    }

                    if (parksOnline === 0) throw new Error("No operational telemetry returned from endpoint nodes.");
                    
                    const history = JSON.parse(localStorage.getItem('dlp_history_v18') || '{}');
                    const newHistory = { ...history };
                    
                    const openRides = allFetchedRides.filter(r => r.is_open);
                    const totalWait = openRides.reduce((sum, r) => sum + r.wait_time, 0);
                    const liveResortLoadFactor = openRides.length > 0 ? (totalWait / openRides.length) : 15;

                    const computedRides = allFetchedRides.map(ride => {
                        let mu_base = ride.isPriority ? 25 : 15;
                        const n = ride.name.toLowerCase();
                        if (n.includes('phantom') || n.includes('pirates') || n.includes('buzz') || n.includes('small world') || n.includes('mansion')) mu_base = 33; 
                        else if (n.includes('crush') || n.includes('peter pan')) mu_base = 13; 

                        const mu_eff = (ride.isPriority ? mu_base * 0.6 : mu_base) * ride.uptime;
                        let velocity = 0;

                        const points = activeLogs[ride.id] || [];
                        if (points.length >= 2) {
                            const lastPoint = points[points.length - 1];
                            const prevPoint = points[points.length - 2];
                            const timeDelta = (lastPoint.t - prevPoint.t) / 60000;
                            if (timeDelta > 0) {
                                velocity = (lastPoint.w - prevPoint.w) / timeDelta;
                            }
                        } else {
                            const velocityRaw = (ride.wait_time - liveResortLoadFactor) / 120; 
                            velocity = Math.max(-0.5, Math.min(0.5, velocityRaw)); 
                        }
                        
                        velocity = Math.max(-2, Math.min(2, velocity)); 
                        let lambda = Math.max(0, mu_eff * (1 + velocity));
                        let rho = mu_eff > 0 ? lambda / mu_eff : 0;

                        newHistory[ride.id] = { wait: ride.wait_time, timestamp: now };
                        
                        const pred30 = Math.max(5, Math.round(ride.wait_time + (velocity * 30)));
                        const pred60 = Math.max(5, Math.round(ride.wait_time + (velocity * 60)));

                        let predDisplay = pred60;
                        if (ride.minsToClose <= 60 && ride.minsToClose > 0) predDisplay = "CLOSING";
                        else if (ride.minsToClose <= 0) predDisplay = "CLOSED";

                        // Compile 24h specific analytics from log
                        const twentyFourHoursAgo = now - 86400000;
                        const todayPoints = points.filter(p => p.t >= twentyFourHoursAgo);
                        
                        let lowMarker = ride.wait_time;
                        let highMarker = ride.wait_time;
                        let avgMarker = ride.wait_time;

                        if (todayPoints.length > 0) {
                            const values = todayPoints.map(p => p.w);
                            lowMarker = Math.min(...values, ride.wait_time);
                            highMarker = Math.max(...values, ride.wait_time);
                            avgMarker = Math.round((values.reduce((s, v) => s + v, 0) + ride.wait_time) / (values.length + 1));
                        }

                        // --- NEW: LOG HOURS ANALYZER ---
                        let bestHourStr = "Calibrating";
                        let worstHourStr = "Calibrating";
                        if (points.length > 0) {
                            const hourlyMap = {};
                            points.forEach(p => {
                                const hr = new Date(p.t).getHours();
                                if (!hourlyMap[hr]) hourlyMap[hr] = { sum: 0, count: 0 };
                                hourlyMap[hr].sum += p.w;
                                hourlyMap[hr].count++;
                            });
                            let minAvg = Infinity;
                            let maxAvg = -Infinity;
                            Object.keys(hourlyMap).forEach(h => {
                                const avg = hourlyMap[h].sum / hourlyMap[h].count;
                                if (avg < minAvg) { minAvg = avg; bestHourStr = `${h.padStart(2, '0')}:00`; }
                                if (avg > maxAvg) { maxAvg = avg; worstHourStr = `${h.padStart(2, '0')}:00`; }
                            });
                        }

                        return {
                            ...ride,
                            mu: Number(mu_eff.toFixed(1)),
                            lambda: Number(lambda.toFixed(1)),
                            rho: Number(rho.toFixed(2)),
                            velocity: Number(velocity.toFixed(2)),
                            predictedWait: predDisplay,
                            projection30m: pred30,
                            projection60m: pred60,
                            routingScore: ride.wait_time - ((typeof predDisplay === 'number' ? predDisplay : 0) - ride.wait_time),
                            aiIntel: generateTacticalIntelligence(ride),
                            analytics: { low: lowMarker, high: highMarker, avg: avgMarker, bestHour: bestHourStr, worstHour: worstHourStr, samples: points.length }
                        };
                    });

                    localStorage.setItem('dlp_history_v18', JSON.stringify(newHistory));
                    setRides(computedRides);
                    setLastSync(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                } catch (err) {
                    if (!isSilent) setError(err.message);
                } finally {
                    if (!isSilent) setLoading(false);
                }
            };

            useEffect(() => {
                bootSystem();
                const syncInterval = setInterval(() => bootSystem(true), 300000); 
                return () => clearInterval(syncInterval);
            }, [activeRegion]);

            // --- FIXED: REGION SPECIFIC CALIBRATION LOCK METRICS ---
            const telemetryStats = useMemo(() => {
                let oldest = Date.now();
                let newest = 0;
                let totalPoints = 0;
                
                const activeRegionParkIds = GLOBAL_PARKS[activeRegion].map(p => p.id);

                rides.forEach(r => {
                    if (activeRegionParkIds.includes(r.parkId)) {
                        const points = globalTelemetryLog[r.id] || [];
                        points.forEach(p => {
                            if (p.t < oldest) oldest = p.t;
                            if (p.t > newest) newest = p.t;
                            totalPoints++;
                        });
                    }
                });
                
                if (totalPoints === 0) return { daysLogged: 0, isReady: false };
                
                const days = Math.max(0.1, (newest - oldest) / 86400000);
                return { daysLogged: days, isReady: days >= 7 };
            }, [globalTelemetryLog, activeRegion, rides]);

            const forecastDaysRow = useMemo(() => {
                const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                const list = [];
                for (let i = 0; i < 7; i++) {
                    const future = new Date(Date.now() + (i * 86400000));
                    list.push({
                        index: i,
                        label: i === 0 ? "Today" : (i === 1 ? "Tomorrow" : dayNames[future.getDay()]),
                        dateNum: future.getDate()
                    });
                }
                return list;
            }, []);

            const calculatedForecastData = useMemo(() => {
                if (rides.length === 0 || !telemetryStats.isReady) return [];
                
                const targetDate = new Date(Date.now() + (selectedForecastDay * 86400000));
                const targetDayOfWeek = targetDate.getDay();

                return rides.map(r => {
                    const points = globalTelemetryLog[r.id] || [];
                    const relevantPoints = points.filter(p => new Date(p.t).getDay() === targetDayOfWeek);
                    
                    let calculatedAvg = 0;
                    let calculatedPeak = 0;
                    let trafficVerdict = "Insufficient Data";

                    if (relevantPoints.length > 0) {
                        const values = relevantPoints.map(p => p.w);
                        calculatedAvg = Math.round(values.reduce((a,b) => a+b, 0) / values.length);
                        calculatedPeak = Math.max(...values);
                        
                        if (calculatedAvg > 45) trafficVerdict = "Very busy";
                        else if (calculatedAvg > 30) trafficVerdict = "Busy";
                        else trafficVerdict = "Moderate";
                    }

                    return { ...r, forecastAvg: calculatedAvg, forecastPeak: calculatedPeak, verdict: trafficVerdict };
                }).sort((a,b) => b.forecastAvg - a.forecastAvg);
            }, [rides, selectedForecastDay, globalTelemetryLog, telemetryStats.isReady]);

            const memoizedData = useMemo(() => {
                if (rides.length === 0) return { itinerary: [], masterSequence: [], completedSequence: [], minorSequence: [], closedSequence: [], metrics: { queueEvasionSaved: 0, walkSaved: 0, totalSavedMins: 0, totalQueueTimeMins: 0 } };

                const completedSequence = [];
                const minorSequence = [];
                const closedSequence = [];
                const activePool = [];

                rides.forEach(r => {
                    if (activePark !== 'all' && r.parkId !== parseInt(activePark)) return;
                    if (completedTargets.has(r.id)) completedSequence.push(r);
                    else if (!r.is_open) closedSequence.push(r);
                    else if (r.isMinor && !activatedMinors.has(r.id)) minorSequence.push(r);
                    else activePool.push(r);
                });

                minorSequence.sort((a, b) => a.name.localeCompare(b.name));
                completedSequence.sort((a, b) => a.name.localeCompare(b.name));
                closedSequence.sort((a, b) => a.name.localeCompare(b.name));

                const grouped = {};
                activePool.forEach(ride => {
                    const zoneKey = `${ride.parkName} - ${ride.landName}`;
                    if (!grouped[zoneKey]) {
                        grouped[zoneKey] = { zoneKey, parkId: ride.parkId, parkName: ride.parkName, landName: ride.landName, rides: [], avgScore: 0 };
                    }
                    grouped[zoneKey].rides.push(ride);
                });

                Object.values(grouped).forEach(zone => {
                    zone.rides.sort((a, b) => a.routingScore - b.routingScore);
                    zone.avgScore = zone.rides.reduce((sum, r) => sum + r.routingScore, 0) / zone.rides.length;
                });

                let tspSortedLands = [];
                const parkGroups = {};
                Object.values(grouped).forEach(z => { if(!parkGroups[z.parkId]) parkGroups[z.parkId] = []; parkGroups[z.parkId].push(z); });

                Object.keys(parkGroups).forEach(pId => {
                   let unvisited = parkGroups[pId];
                   let currentPos = { x: 50, y: 95 }; 
                   
                   if (gpsEnabled && userGPS && TACTICAL_COORDS[pId]) {
                       let closestLand = null;
                       let minDistance = Infinity;
                       TACTICAL_COORDS[pId].forEach(land => {
                           const d = getHaversineDistance(userGPS.lat, userGPS.lng, land.lat, land.lng);
                           if (d < minDistance) { minDistance = d; closestLand = land; }
                       });
                       if (closestLand) currentPos = { x: closestLand.x, y: closestLand.y };
                   } else {
                       const completedArray = Array.from(completedTargets);
                       for (let i = completedArray.length - 1; i >= 0; i--) {
                           const lastRide = rides.find(r => r.id === completedArray[i]);
                           if (lastRide && lastRide.parkId.toString() === pId) {
                               currentPos = getCoords(pId, lastRide.landName); break; 
                           }
                       }
                   }

                   while(unvisited.length > 0) {
                      unvisited.forEach(zone => {
                         const dest = getCoords(pId, zone.landName);
                         const physicalDistance = Math.sqrt(Math.pow(dest.x - currentPos.x, 2) + Math.pow(dest.y - currentPos.y, 2));
                         const travelTimeMins = Math.max(2, Math.round(physicalDistance * 0.15)); 
                         
                         zone.travelTimeFromLast = travelTimeMins;
                         zone.tspCostScore = zone.avgScore + (travelTimeMins * 3.5); 
                         zone.coords = dest;
                      });
                      
                      unvisited.sort((a,b) => a.tspCostScore - b.tspCostScore);
                      const nextZone = unvisited.shift();
                      tspSortedLands.push(nextZone);
                      currentPos = nextZone.coords; 
                   }
                });

                let sequence = [];
                let counter = 1;
                let tspTotalWalk = 0;
                let queueEvasionSaved = 0;
                let totalQueueTimeMins = 0;

                tspSortedLands.forEach(zone => {
                    tspTotalWalk += zone.travelTimeFromLast;
                    zone.rides.forEach(ride => {
                        sequence.push({ ...ride, globalStep: counter++, zoneInfo: zone });
                        totalQueueTimeMins += Math.round(ride.wait_time);
                        if (ride.velocity > 0 && typeof ride.predictedWait === 'number') {
                            queueEvasionSaved += Math.round(ride.predictedWait - ride.wait_time);
                        }
                    });
                });

                let walkSaved = Math.round(tspTotalWalk * 0.8);
                let totalSavedMins = Math.round(walkSaved + queueEvasionSaved);

                return { 
                    itinerary: tspSortedLands, masterSequence: sequence,
                    completedSequence, minorSequence, closedSequence,
                    metrics: { queueEvasionSaved: Math.round(queueEvasionSaved), walkSaved, totalSavedMins, totalQueueTimeMins: Math.round(totalQueueTimeMins) }
                };
            }, [rides, activePark, completedTargets, activatedMinors, gpsEnabled, userGPS]);

            const { itinerary, masterSequence, completedSequence, minorSequence, closedSequence, metrics } = memoizedData;

            const RideCard = ({ ride, isCompleted, isMinor, isClosed, globalStep }) => {
                const isExpanded = expandedRideId === ride.id;
                const intel = ride.aiIntel;

                const projection30m = ride.projection30m;
                const projection60m = ride.projection60m;
                const delta30m = projection30m - ride.wait_time;
                const delta60m = projection60m - ride.wait_time;

                let recommendation = "Moderate crowds so far";
                let recStyle = "text-amber-500 bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800";
                let recIcon = I.Activity;
                if (ride.velocity < -0.1 || (ride.wait_time <= 15 && ride.velocity <= 0)) {
                    recommendation = "Great time to go";
                    recStyle = "text-emerald-600 bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800";
                    recIcon = I.ThumbsUp;
                } else if (ride.velocity > 0.3 || ride.wait_time >= 60) {
                    recommendation = "Avoid if possible";
                    recStyle = "text-rose-600 bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-800";
                    recIcon = I.AlertTriangle;
                }

                return (
                    <div className="relative group mb-3">
                        <div 
                            onClick={() => toggleExpand(ride.id)}
                            className={`flex items-center p-3 rounded-xl transition-all cursor-pointer border ${
                                isClosed ? 'bg-white dark:bg-[#080b12] border-rose-200 dark:border-rose-900/30' :
                                isCompleted ? 'bg-slate-100 dark:bg-[#080b12] border-slate-200 dark:border-slate-800 hover:bg-white dark:hover:bg-[#0c111a]' :
                                isMinor ? 'bg-slate-100 dark:bg-[#080b12] border-slate-200 dark:border-slate-800 hover:bg-white dark:hover:bg-[#0c111a]' :
                                ride.isPriority ? 'bg-emerald-50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-500/20 hover:border-emerald-400 dark:hover:border-emerald-500/50' : 
                                'bg-white dark:bg-[#0c111a] border-slate-200 dark:border-slate-800 hover:border-slate-400 dark:hover:border-slate-600'
                            } ${isExpanded ? 'rounded-b-none border-b-0' : ''}`}
                        >
                            {!isMinor && !isCompleted && !isClosed && (
                                <>
                                    <div className="absolute -left-8 top-1/2 w-8 h-[2px] bg-slate-300 dark:bg-slate-800 group-hover:bg-emerald-400 dark:group-hover:bg-emerald-500/50 transition-colors z-0 hidden md:block"></div>
                                    <div className={`absolute -left-[45px] top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-lg transition-all z-10 hidden md:flex ${
                                        ride.isPriority ? 'bg-emerald-500 text-white dark:text-black border-2 border-white dark:border-[#05070a] scale-110 shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-2 border-white dark:border-[#05070a]'
                                    }`}>
                                        {globalStep}
                                    </div>
                                </>
                            )}

                            <div className="mr-3 flex shrink-0">
                                {isClosed ? (
                                    <div className="w-5 h-5 rounded border border-rose-300 dark:border-rose-900/50 flex items-center justify-center bg-rose-100 dark:bg-rose-950/20">
                                        <Icon path={I.X} size={12} className="text-rose-500 dark:text-rose-500/50" />
                                    </div>
                                ) : (
                                    <input 
                                        type="checkbox" 
                                        checked={isCompleted || (!isMinor && !masterSequence.find(r=>r.id===ride.id) && !isCompleted)}
                                        onChange={(e) => isMinor ? toggleMinor(e, ride.id) : toggleRide(e, ride.id)}
                                        onClick={(e) => e.stopPropagation()}
                                        className={`w-5 h-5 rounded cursor-pointer bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700 ${isMinor ? 'accent-slate-500 dark:accent-slate-600' : 'accent-emerald-500'}`} 
                                    />
                                )}
                            </div>

                            <div className={`flex-grow min-w-0 pr-2 ${isCompleted ? 'opacity-50' : ''}`}>
                                <div className="flex items-center gap-2">
                                    <h4 className={`text-sm font-bold line-clamp-1 leading-tight ${
                                        isCompleted ? 'text-slate-500 line-through decoration-slate-400 dark:decoration-slate-600' : 
                                        isClosed ? 'text-slate-500 dark:text-slate-400' :
                                        ride.isPriority ? 'text-emerald-700 dark:text-emerald-50' : 'text-slate-700 dark:text-slate-200 group-hover:text-slate-900 dark:group-hover:text-white'
                                    }`}>
                                        {ride.name}
                                    </h4>
                                </div>
                                {ride.isPriority && !isCompleted && !isClosed && (
                                    <span className="inline-flex items-center gap-1 mt-1 text-[8px] font-black bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 px-1.5 py-0.5 rounded uppercase tracking-wider">
                                        <Icon path={I.Target} size={8} /> Priority Target
                                    </span>
                                )}
                                {(isCompleted || isMinor || isClosed) && (
                                    <p className="text-[9px] font-mono text-slate-500 dark:text-slate-600 uppercase mt-1 line-clamp-1">{ride.parkName} - {ride.landName}</p>
                                )}
                            </div>

                            <div className="flex flex-col items-end justify-center shrink-0 ml-auto px-2">
                                {isClosed ? (
                                    <span className="text-rose-600 dark:text-rose-500 bg-rose-100 dark:bg-rose-500/10 px-2 py-1 rounded text-[10px] font-bold font-mono border border-rose-200 dark:border-transparent">CLOSED</span>
                                ) : (
                                    <>
                                        <div className="flex items-center gap-1 text-right mb-0.5">
                                            <div className={`font-black text-lg flex items-center gap-1 ${isCompleted ? 'text-slate-400 dark:text-slate-500' : ride.wait_time <= 30 ? 'text-emerald-600 dark:text-emerald-400' : ride.wait_time <= 60 ? 'text-amber-500 dark:text-amber-400' : 'text-rose-600 dark:text-rose-500'}`}>
                                                <Icon path={I.Timer} size={14} /> {Math.round(ride.wait_time)}
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-tighter w-4">MIN</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>

                        {isExpanded && (
                            <div className={`p-4 md:p-6 bg-slate-50 dark:bg-[#05070a] border border-t-0 rounded-b-xl animate-in slide-in-from-top-2 relative z-10 ${
                                isClosed ? 'border-rose-200 dark:border-rose-900/30' : ride.isPriority ? 'border-emerald-200 dark:border-emerald-500/20' : 'border-slate-200 dark:border-slate-800'
                            }`}>
                                <div className="mb-4 pb-4 border-b border-slate-200 dark:border-slate-800">
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        <span className="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">{intel.type}</span>
                                        <span className="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">{intel.env}</span>
                                        {intel.tags.map(tag => (
                                            <span key={tag} className="bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-wider">{tag}</span>
                                        ))}
                                    </div>
                                    <p className="text-sm text-slate-600 dark:text-slate-400 leading-relaxed font-medium">{intel.brief}</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-4">
                                        
                                        {/* --- FIXED: GROUND-TRUTH HISTORICAL HIGH-PRECISION ANALYSIS LABELS --- */}
                                        <div className={`p-4 rounded-xl border ${recStyle}`}>
                                            <h5 className="text-[10px] font-black uppercase tracking-widest mb-1 opacity-80">Recommendation</h5>
                                            <div className="flex items-center gap-2 font-bold text-lg mb-2">
                                                <Icon path={recIcon} size={20} /> {recommendation}
                                            </div>
                                            <div className="flex justify-between text-xs font-medium opacity-80 font-mono">

                                            </div>

                                            {completedSequence.length > 0 && (
                                                <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                    <h3 className="text-xs font-black uppercase mb-4 tracking-widest text-slate-400">Completed Archive</h3>
                                                    <div className="opacity-60 space-y-3">
                                                        {completedSequence.map(ride => <RideCard key={ride.id} ride={ride} isCompleted={true} />)}
                                                    </div>
                                                </div>
                                            )}

                                            {minorSequence.length > 0 && (
                                                <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                    <h3 className="text-xs font-black uppercase mb-4 tracking-widest text-slate-400">All Other Attractions (Optional)</h3>
                                                    <div className="opacity-80 space-y-3">
                                                        {minorSequence.map(ride => <RideCard key={ride.id} ride={ride} isMinor={true} />)}
                                                    </div>
                                                </div>
                                            )}

                                            {closedSequence.length > 0 && (
                                                <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                    <h3 className="text-xs font-black uppercase mb-4 tracking-widest text-rose-500">Offline Attractions</h3>
                                                    <div className="opacity-80 dark:opacity-70 space-y-3">
                                                        {closedSequence.map(ride => <RideCard key={ride.id} ride={ride} isClosed={true} />)}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white dark:bg-[#0c111a] border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-sm w-full animate-in slide-in-from-bottom-4 duration-300">
                                
                                {!telemetryStats.isReady ? (
                                    <div className="bg-slate-50 dark:bg-[#080b12] border border-slate-200 dark:border-slate-800 rounded-3xl p-12 text-center shadow-inner flex flex-col items-center justify-center my-8">
                                        <Icon path={I.Lock} size={48} className="text-slate-300 dark:text-slate-700 mb-6" />
                                        <h3 className="text-xl font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-2">Forecast Matrix Offline</h3>
                                        <p className="text-sm text-slate-500 max-w-md mx-auto mb-8 leading-relaxed">
                                            This engine enforces a strict zero-synthetic-data policy. The system is currently running background telemetry sweeps to build an authentic 7-day queue model.
                                        </p>
                                        
                                        <div className="w-full max-w-sm">
                                            <div className="flex justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">
                                                <span>Calibration Progress</span>
                                                <span className="text-emerald-500">{telemetryStats.daysLogged.toFixed(1)} / 7 Days</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                                <div className="h-full bg-emerald-500 transition-all duration-1000" style={{ width: `${Math.min(100, (telemetryStats.daysLogged / 7) * 100)}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="mb-4">
                                            <p className="text-xs font-mono text-emerald-500 uppercase tracking-widest mb-1">True Historical Forecast Window</p>
                                            <h2 className="text-2xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Resort Prediction Hub</h2>
                                        </div>

                                        <div className="flex gap-2 border-b border-slate-100 dark:border-slate-800 pb-4 mb-6 overflow-x-auto">
                                            {forecastDaysRow.map(day => (
                                                <button 
                                                    key={day.index}
                                                    onClick={() => setSelectedForecastDay(day.index)}
                                                    className={`flex flex-col items-center p-3 rounded-2xl min-w-[70px] border transition-all ${
                                                        selectedForecastDay === day.index 
                                                            ? 'bg-emerald-600 border-emerald-500 text-white shadow-md font-bold scale-105' 
                                                            : 'bg-slate-50 dark:bg-[#05070a] border-slate-200 dark:border-slate-800/80 text-slate-500 dark:text-slate-400 hover:border-slate-300'
                                                    }`}
                                                >
                                                    <span className="text-[10px] font-mono uppercase opacity-80">{day.label}</span>
                                                    <span className="text-lg font-black mt-0.5">{day.dateNum}</span>
                                                </button>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {calculatedForecastData
                                                .filter(r => activePark === 'all' || r.parkId.toString() === activePark)
                                                .map(ride => (
                                                    <div key={ride.id} className="bg-slate-50 dark:bg-[#05070a] border border-slate-200 dark:border-slate-800/50 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                                                        <div className="min-w-0 pr-2">
                                                            <h4 className="font-bold text-sm text-slate-900 dark:text-slate-200 truncate">{ride.name}</h4>
                                                            <p className="text-[10px] text-slate-400 font-mono mt-0.5 truncate">{ride.landName}</p>
                                                            
                                                            <span className={`inline-block text-[9px] font-black uppercase rounded mt-2 px-1.5 py-0.5 ${
                                                                ride.verdict.includes("Very busy") ? "bg-rose-100 dark:bg-rose-950/30 text-rose-600" :
                                                                ride.verdict.includes("Busy") ? "bg-amber-100 dark:bg-amber-950/30 text-amber-600" :
                                                                "bg-emerald-100 dark:bg-emerald-950/30 text-emerald-600"
                                                            }`}>
                                                                {ride.verdict}
                                                            </span>
                                                        </div>
                                                        <div className="text-right shrink-0 font-mono">
                                                            <div className="text-xl font-black text-slate-800 dark:text-slate-100">{ride.forecastAvg}m</div>
                                                            <div className="text-[9px] text-slate-400 uppercase tracking-wider">Peak: {ride.forecastPeak}m</div>
                                                        </div>
                                                    </div>
                                            ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* TERMINAL */}
                        <div className="mt-12 border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-[#0c111a] overflow-hidden">
                            <button onClick={() => setShowTerminal(!showTerminal)} className="w-full flex justify-between p-3 text-[10px] font-mono tracking-widest text-slate-500 dark:text-slate-400 uppercase border-b border-slate-200 dark:border-transparent">
                                <span>Network Daemon Logs</span> <span>[TOGGLE]</span>
                            </button>
                            {showTerminal && (
                                <div className="p-4 bg-slate-100 dark:bg-[#020408] h-48 overflow-y-auto font-mono text-[10px] terminal-scroll shadow-inner">
                                    {logs.map((log, i) => (
                                        <div key={i} className="flex gap-2 text-slate-500">
                                            <span>[{log.time}]</span> <span className={log.type === 'success' ? 'text-emerald-500' : ''}>{log.msg}</span>
                                        </div>
                                    ))}
                                    <div ref={logsEndRef} />
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(App / >);
    </script>
</body>
</html>
