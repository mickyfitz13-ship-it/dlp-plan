            const [gpsEnabled, setGpsEnabled] = useState(() => JSON.parse(localStorage.getItem('dlp_gps_v18') || 'false'));
            const [userGPS, setUserGPS] = useState(null);
            const [heading, setHeading] = useState(null);
            // GPS lifecycle so the UI can show feedback instead of a blank space:
            // 'off' (toggle off) | 'acquiring' (on, waiting for first fix) | 'active' (got a fix) | 'denied' (permission blocked) | 'lost' (was active, signal dropped)
            const [gpsStatus, setGpsStatus] = useState('off');
            useEffect(() => {
                localStorage.setItem('dlp_gps_v18', JSON.stringify(gpsEnabled));
                let watchId;
                if (gpsEnabled && navigator.geolocation) {
                    setGpsStatus(prev => (prev === 'active' ? 'active' : 'acquiring'));
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            const next = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            setUserGPS(prev => (!prev || getHaversineDistance(prev.lat, prev.lng, next.lat, next.lng) > 0.008) ? next : prev);
                            setGpsStatus('active');
                        },
                        (err) => {
                            setGpsStatus(err && err.code === 1 ? 'denied' : (userGPS ? 'lost' : 'acquiring'));
                            addLog(`[WARN] GPS Signal lost or denied: ${err.message}`, 'warn');
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                    addLog(`[SYS] Satellite Tracking active. Syncing Dynamic Origin.`, 'success');
                } else {
                    setUserGPS(null);
                    setGpsStatus('off');
                    if (gpsEnabled && !navigator.geolocation) { setGpsStatus('denied'); addLog(`[WARN] Geolocation not supported by this browser.`, 'warn'); }
                    else addLog(`[SYS] Satellite Tracking offline. Reverting to manual sequencing.`, 'info');
                }
                return () => { if(watchId) navigator.geolocation.clearWatch(watchId); };
            }, [gpsEnabled]);
            const toggleGPS = () => {
                const next = !gpsEnabled;
                setGpsEnabled(next);
                // iOS 13+ requires the compass permission to be requested from within the tap.
                if (next && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().catch(() => {});
                }
            };
            // Live onboard compass: feeds the device heading so direction arrows rotate to
            // point at the real-world target as you turn. Falls back to north-up when no
            // magnetometer/permission (e.g. desktop).
            useEffect(() => {
                if (!gpsEnabled) { setHeading(null); return; }
                const handler = (e) => {
                    let hd = null;
                    if (typeof e.webkitCompassHeading === 'number') hd = e.webkitCompassHeading; // iOS
                    else if (e.absolute && typeof e.alpha === 'number') hd = (360 - e.alpha) % 360; // Android absolute
                    if (hd !== null && !isNaN(hd)) setHeading(hd);
                };
                window.addEventListener('deviceorientationabsolute', handler, true);
                window.addEventListener('deviceorientation', handler, true);
                return () => {
                    window.removeEventListener('deviceorientationabsolute', handler, true);
                    window.removeEventListener('deviceorientation', handler, true);
                };
            }, [gpsEnabled]);
            const [completedTargets, setCompletedTargets] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_completed_v18') || '[]')));
            const [activatedMinors, setActivatedMinors] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_activated_v18') || '[]')));
            const [logs, setLogs] = useState([]);
            const [showTerminal, setShowTerminal] = useState(true);
            const logsEndRef = useRef(null);
            useEffect(() => {
                if (logsEndRef.current) logsEndRef.current.scrollTop = logsEndRef.current.scrollHeight;
            }, [logs, showTerminal]);
            const buildHash = useMemo(() => {
                const d = new Date();
                return `BUILD ${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            }, [lastSync]);
            const newestTelemetryTimestamp = useMemo(() => {
                let newest = 0;
                Object.values(globalTelemetryLog).forEach(points => {
                    points.forEach(p => {
                        if (p.t > newest) newest = p.t;
                    });
                });
                return newest;
            }, [globalTelemetryLog]);
            useEffect(() => {
                const timer = setInterval(() => {
                    setNextSyncSeconds(prev => (prev > 0 ? prev - 1 : 0));
                    if (newestTelemetryTimestamp > 0) {
                        const diffMins = Math.floor((Date.now() - newestTelemetryTimestamp) / 60000);
                        setTelemetryAgeMins(diffMins);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [newestTelemetryTimestamp]);
            useEffect(() => localStorage.setItem('dlp_completed_v18', JSON.stringify(Array.from(completedTargets))), [completedTargets]);
            useEffect(() => localStorage.setItem('dlp_activated_v18', JSON.stringify(Array.from(activatedMinors))), [activatedMinors]);
            const handleRegionChange = (newRegion) => {
                setActiveRegion(newRegion);
                setActivePark('all');
                localStorage.setItem('global_region_v4', newRegion);
                localStorage.setItem('global_park_v4', 'all');
            };
            const toggleExpand = (id) => setExpandedRideId(prev => prev === id ? null : id);
            const toggleRide = (e, rideId) => {
                e.stopPropagation();
                const isCurrentlyCompleted = completedTargets.has(rideId);
                setCompletedTargets(prev => {
                    const next = new Set(prev);
                    if (isCurrentlyCompleted) {
                        next.delete(rideId);
                        addLog(`[SYS] Objective restored from archive.`, 'success');
                    }
                    else {
                        next.add(rideId);
                        addLog(`[SYS] Objective complete. Updating Dynamic Origin vector.`, 'info');
                    }
                    return next;
                });
                if (isCurrentlyCompleted) {
                    setActivatedMinors(prev => {
                        const next = new Set(prev);
                        next.delete(rideId);
                        return next;
                    });
                }
            };
            const toggleMinor = (e, rideId) => {
                e.stopPropagation();
                setActivatedMinors(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) { next.delete(rideId); addLog(`[SYS] Demoting attraction back to the background repository.`, 'info'); }
                    else { next.add(rideId); addLog(`[SYS] Promoting attraction into active routing matrix.`, 'success'); }
                    return next;
                });
            };
            const resetProgress = () => {
                if(window.confirm("Clear all completed objectives and reset your daily sequence?")) {
                    setCompletedTargets(new Set());
                    setActivatedMinors(new Set());
                    addLog(`[SYS] Daily routing progress manually cleared.`, 'warn');
                }
            };
            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 3 });
                setLogs(prev => [...prev.slice(-149), { time, msg, type }]);
            };
            const fetchBackgroundLogs = async () => {
                try {
                    const res = await fetch('./telemetry.json?v=' + Date.now());
                    if (res.ok) {
                        const parsedLog = normalizeTelemetry(await res.json());
                        addLog(`[SYS] GitHub Telemetry Repository integrated (${Object.keys(parsedLog).length} rides tracked).`, 'success');
                        return parsedLog;
                    }
                    addLog(`[WARN] telemetry.json returned HTTP ${res.status}. Awaiting cron sweep.`, 'warn');
                } catch(e) {
                    addLog(`[WARN] No telemetry file found yet. Awaiting cron sweep.`, 'warn');
                }
                return {};
            };
            const syncTokenRef = useRef(0);
            const prevWaitsRef = useRef({});
            const feedChangeRef = useRef({});

            const bootSystem = async (isSilent = false) => {
                const token = ++syncTokenRef.current;
                if (!isSilent) setLoading(true);
                setError(null);
                setNextSyncSeconds(300);
                if (isSilent) {
                    addLog(`[CRON] 5-Minute background polling interval triggered.`, 'info');
                } else {
                    addLog(`[SYS] Boot sequence initialized for ${activeRegion}. Live Data Engine active.`, 'info');
                }

                try {
                    const activeLogs = await fetchBackgroundLogs();
                    if (token === syncTokenRef.current) setGlobalTelemetryLog(activeLogs);
                    const allFetchedRides = [];
                    let parksOnline = 0;
                    const CURRENT_PARKS = GLOBAL_PARKS[activeRegion];
                    const now = Date.now();

                    for (const park of CURRENT_PARKS) {
                        try {
                            let data = null;
                            for (const proxy of PROXIES) {
                                try {
                                    addLog(`[NET] Engaging node: ${proxy.name} for ${park.name}...`, 'info');
                                    data = await proxy.fetch(`https://queue-times.com/parks/${park.id}/queue_times.json`);
                                    if (data && (data.lands || data.rides)) break;
                                } catch(e) { addLog(`[WARN] Node timeout/failure: ${e.message}`, 'warn'); }
                            }
                            if (!data || (!data.lands && !data.rides)) throw new Error("All network nodes isolated.");
                            let minsToClose = 999;
                            try {
                                const scheduleData = await fetchWithTimeout(`https://api.themeparks.wiki/v1/entity/${park.tpUuid}/schedule`);
                                const scheduleJson = JSON.parse(scheduleData);
                                if (scheduleJson && scheduleJson.schedule) {
                                    // The park is open only if NOW falls inside an operating window
                                    // (opening <= now < closing). Just checking closingTime > now
                                    // wrongly matched tomorrow's window after midnight.
                                    const activeSchedule = scheduleJson.schedule.find(s =>
                                        s.type === "OPERATING" &&
                                        new Date(s.openingTime).getTime() <= now &&
                                        new Date(s.closingTime).getTime() > now
                                    );
                                    if (activeSchedule) {
                                        minsToClose = (new Date(activeSchedule.closingTime).getTime() - now) / 60000;
                                    } else {
                                        minsToClose = -1; // closed right now
                                    }
                                }
                            } catch(e) { addLog(`[WARN] Schedule extraction timeout.`, 'warn'); }
                            // Pull accurate attraction coordinates once per park (themeparks.wiki), so the
                            // live map and GPS use real ride positions instead of the static estimates.
                            if (!RIDE_GEO_LIVE[park.id]) {
                                try {
                                    const childrenRaw = await fetchWithTimeout(`https://api.themeparks.wiki/v1/entity/${park.tpUuid}/children`);
                                    const cj = JSON.parse(childrenRaw);
                                    if (cj && Array.isArray(cj.children)) {
                                        const geo = [];
                                        cj.children.forEach(c => {
                                            if (!c || !c.location) return;
                                            const lat = c.location.latitude, lng = c.location.longitude;
                                            if ((c.entityType === 'ATTRACTION' || c.entityType === 'SHOW') && typeof lat === 'number' && typeof lng === 'number') {
                                                const _n = normName(c.name);
                                                geo.push({ name: c.name, lat, lng, _n, _t: _n.split(' ').filter(t => t.length > 2) });
                                            }
                                        });
                                        if (geo.length) { RIDE_GEO_LIVE[park.id] = geo; addLog(`[GEO] Synced ${geo.length} real ride positions for ${park.name}.`, 'success'); }
                                    }
                                } catch(e) { addLog(`[WARN] Coordinate sync skipped for ${park.name}.`, 'warn'); }
                            }
                            parksOnline++;
                            let rawRides = [];
                            if (Array.isArray(data.lands)) {
                                data.lands.forEach(land => {
                                    if (land && Array.isArray(land.rides)) {
                                        land.rides.forEach(r => { if (r) rawRides.push({ ...r, landName: land.name || 'Park Grounds' }); });
                                    }
                                });
                            }
                            if (Array.isArray(data.rides)) {
                                data.rides.forEach(r => { if (r) rawRides.push({ ...r, landName: 'Park Grounds' }); });
                            }
                            let freshTs = 0;
                            rawRides.forEach(r => {
                                const ts = Date.parse(r.last_updated);
                                if (ts && ts > freshTs) freshTs = ts;
                            });
                            rawRides.forEach(r => {
                                const pts = activeLogs[r.id];
                                if (!pts || pts.length < 2) return;
                                for (let i = pts.length - 1; i > 0; i--) {
                                    if (pts[i].w !== pts[i - 1].w) {
                                        if (pts[i].t > freshTs) freshTs = pts[i].t;
                                        break;
                                    }
                                }
                            });
                            let liveChange = false;
                            rawRides.forEach(r => {
                                const prev = prevWaitsRef.current[r.id];
                                if (prev !== undefined && prev !== r.wait_time) liveChange = true;
                                prevWaitsRef.current[r.id] = r.wait_time;
                            });
                            if (liveChange) feedChangeRef.current[park.id] = now;
                            if (feedChangeRef.current[park.id] && feedChangeRef.current[park.id] > freshTs) freshTs = feedChangeRef.current[park.id];
                            const parkDataAgeMins = freshTs > 0 ? Math.max(0, Math.round((now - freshTs) / 60000)) : null;
                            if (parkDataAgeMins !== null && parkDataAgeMins > 30) {
                                addLog(`[WARN] ${park.name}: no confirmed queue movement for ${parkDataAgeMins} mins. Values may lag reality.`, 'warn');
                            }
                            const processed = rawRides
                                .filter(r => r.id != null && typeof r.name === 'string' && r.name && !r.name.toLowerCase().includes('single rider'))
                                .map(r => {
                                    const isPriority = PRIORITY_RIDES.some(top => r.name.toLowerCase().includes(top.toLowerCase()));
                                    const coords = getCoords(park.id, r.landName);
                                    return {
                                        ...r,
                                        // Coerce upstream fields so malformed proxy payloads can't inject NaN/undefined.
                                        wait_time: Number.isFinite(Number(r.wait_time)) ? Number(r.wait_time) : 0,
                                        is_open: r.is_open === true || r.is_open === 'true' || r.is_open === 1,
                                        parkName: park.name,
                                        parkId: park.id,
                                        isPriority: isPriority,
                                        isMinor: !isPriority,
                                        coords: { x: coords.x, y: coords.y },
                                        duration: isPriority ? 5 : 3,
                                        uptime: 0.95,
                                        minsToClose: minsToClose,
                                        dataAgeMins: parkDataAgeMins
                                    };
                                });
                            allFetchedRides.push(...processed);
                        } catch (e) { addLog(`[ERR] ${park.name} completely isolated.`, 'error'); }
                    }
                    if (parksOnline === 0) throw new Error("No operational telemetry returned from endpoint nodes.");
                    // Filter out closed/0 rides from the global load factor so it remains accurate
                    const openRides = allFetchedRides.filter(r => r.is_open && r.wait_time > 0);
                    const totalWait = openRides.reduce((sum, r) => sum + r.wait_time, 0);
                    const liveResortLoadFactor = openRides.length > 0 ? (totalWait / openRides.length) : 15;
                    const computedRides = allFetchedRides.map(ride => {
                        let mu_base = ride.isPriority ? 25 : 15;
                        const n_name = ride.name.toLowerCase();
                        if (n_name.includes('phantom') || n_name.includes('pirates') || n_name.includes('buzz') || n_name.includes('small world') || n_name.includes('mansion')) {
                            mu_base = 33;
                        } else if (n_name.includes('crush') || n_name.includes('peter pan')) {
                            mu_base = 13;
                        }
                        const mu_eff = (ride.isPriority ? mu_base * 0.6 : mu_base) * (ride.uptime || 1);

                        // allPoints is already swept clear of zeros via normalizeTelemetry
                        const allPoints = activeLogs[ride.id] || [];
                        const currentTime = Date.now();
                        const ninetyMinsInMillis = 90 * 60 * 1000;
                        const windowPoints = allPoints.filter(p => (currentTime - p.t) <= ninetyMinsInMillis);
                        // Prevent zero-injection on active live syncs
                        if (ride.is_open && ride.wait_time > 0) windowPoints.push({ t: currentTime, w: ride.wait_time });
                        let velocity = 0;
                        const N = windowPoints.length;
                        if (N >= 2) {
                            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
                            const baseTime = windowPoints[0].t;
                            for (let i = 0; i < N; i++) {
                                const x = (windowPoints[i].t - baseTime) / 60000;
                                const y = windowPoints[i].w;
                                sumX += x;
                                sumY += y;
                                sumXY += (x * y);
                                sumXX += (x * x);
                            }
                            const numerator = (N * sumXY) - (sumX * sumY);
                            const denominator = (N * sumXX) - (sumX * sumX);
                            if (denominator !== 0) {
                                velocity = numerator / denominator;
                            } else {
                                velocity = 0;
                            }
                        } else {
                            const velocityRaw = (ride.wait_time - liveResortLoadFactor) / 120;
                            velocity = Math.max(-0.5, Math.min(0.5, velocityRaw));
                        }

                        velocity = Math.max(-2, Math.min(2, velocity));
                        let lambda = Math.max(0, mu_eff * (1 + velocity));
                        let rho = mu_eff > 0 ? lambda / mu_eff : 0;
                        const currentWait = ride.wait_time || 0;
                        const pred30Raw = Math.round(currentWait + (velocity * 30));
                        const pred60Raw = Math.round(currentWait + (velocity * 60));
                        const pred30 = Math.min(180, Math.max(0, pred30Raw));
                        const pred60 = Math.min(180, Math.max(0, pred60Raw));
                        let predDisplay = pred60;
                        if (ride.minsToClose <= 60 && ride.minsToClose > 0) predDisplay = "CLOSING";
                        else if (ride.minsToClose <= 0) predDisplay = "CLOSED";

                        const twentyFourHoursAgo = now - 86400000;
                        const todayPoints = allPoints.filter(p => p.t >= twentyFourHoursAgo);
                        // Baseline at 5 if closed, otherwise take live wait
                        const currentValidWait = ride.wait_time > 0 ? ride.wait_time : null;
                        let lowMarker = currentValidWait || 5;
                        let highMarker = currentValidWait || 5;
                        let avgMarker = currentValidWait || 5;
                        if (todayPoints.length > 0) {
                            const values = todayPoints.map(p => p.w);
                            if (currentValidWait) values.push(currentValidWait);
                            lowMarker = Math.min(...values);
                            highMarker = Math.max(...values);
                            avgMarker = Math.round(values.reduce((s, v) => s + v, 0) / values.length);
                        }

                        let bestHourStr = "Calibrating";
                        let worstHourStr = "Calibrating";
                        let timeSpanStr = "24 hours";
                        let hourlyCurve = null;
                        if (allPoints.length > 0) {
                            const todayDow = getParkDay(now, ride.parkId);
                            const hourlyMap = {};
                            const hourlyMapDow = {};
                            allPoints.forEach(p => {
                                const hr = getParkHour(p.t, ride.parkId);
                                // Ignore points logged outside plausible operating hours: even with
                                // zeros filtered, a frozen feed can echo stale NON-zero waits overnight,
                                // which would otherwise pollute the curve and "best hour".
                                if (hr < EARLIEST_PARK_HOUR) return;
                                if (!hourlyMap[hr]) hourlyMap[hr] = { sum: 0, count: 0 };
                                hourlyMap[hr].sum += p.w;
                                hourlyMap[hr].count++;
                                if (getParkDay(p.t, ride.parkId) === todayDow) {
                                    if (!hourlyMapDow[hr]) hourlyMapDow[hr] = { sum: 0, count: 0 };
                                    hourlyMapDow[hr].sum += p.w;
                                    hourlyMapDow[hr].count++;
                                }
                            });

                            // Day-of-week aware curve: a Saturday 14h is not a Tuesday 14h. Prefer
                            // same-weekday history once an hour has 3+ samples; else all-days average.
                            hourlyCurve = new Array(24).fill(null);
                            Object.keys(hourlyMap).forEach(h => {
                                const hh = Number(h);
                                const dow = hourlyMapDow[h];
                                hourlyCurve[hh] = (dow && dow.count >= 3) ? dow.sum / dow.count : hourlyMap[h].sum / hourlyMap[h].count;
                            });

                            let minAvg = Infinity;
                            let maxAvg = -Infinity;
                            Object.keys(hourlyMap).forEach(h => {
                                const avg = hourlyMap[h].sum / hourlyMap[h].count;
                                if (avg < minAvg) { minAvg = avg; bestHourStr = `${h.padStart(2, '0')}h`; }
                                if (avg > maxAvg) { maxAvg = avg; worstHourStr = `${h.padStart(2, '0')}h`; }
                            });
                            if (allPoints.length > 1) {
                                const diffDays = (allPoints[allPoints.length - 1].t - allPoints[0].t) / 86400000;
                                if (diffDays >= 1) timeSpanStr = `${Math.round(diffDays)} days`;
                            }
                        }

                        // Fill any hours the telemetry hasn't covered with the queue-times.com
                        // historical prior, so the day-simulation has a full intraday curve even
                        // before 7 days of telemetry exist. Live-derived hours always take priority.
                        const priorCurve = statCurve(ride.parkId, ride.name);
                        let hasCurve = allPoints.length >= 24;
                        if (priorCurve) {
                            if (!hourlyCurve) hourlyCurve = new Array(24).fill(null);
                            for (let hh = 7; hh < 24; hh++) {
                                if (typeof hourlyCurve[hh] !== 'number') hourlyCurve[hh] = priorCurve[hh];
                            }
                            hasCurve = true;
                        }

                        const trendGain = Math.max(-30, Math.min(60, pred60 - ride.wait_time));
                        const dealBonus = allPoints.length >= 8 ? Math.max(-20, Math.min(20, avgMarker - ride.wait_time)) : 0;
                        const priorityBonus = ride.isPriority ? 18 : 0;
                        const routingScore = (ride.wait_time * 0.6) - (trendGain * 1.2) - dealBonus - priorityBonus;

                        let routingReason = "Steady queue";
                        if (trendGain >= 10) routingReason = `Rising: +${Math.round(trendGain)}m expected within the hour`;
                        else if (trendGain <= -10) routingReason = `Easing: -${Math.round(Math.abs(trendGain))}m expected soon`;
                        else if (dealBonus >= 8) routingReason = `Bargain: ${Math.round(dealBonus)}m under its daily average`;
                        else if (dealBonus <= -8) routingReason = `Inflated: ${Math.round(Math.abs(dealBonus))}m over its daily average`;
                        else if (ride.isPriority) routingReason = "Priority target, queue steady";

                        return {
                            ...ride,
                            mu: Number(mu_eff.toFixed(1)),
                            lambda: Number(lambda.toFixed(1)),
                            rho: Number(rho.toFixed(2)),
                            velocity: Number(velocity.toFixed(2)),
                            predictedWait: predDisplay,
                            projection30m: pred30,
                            projection60m: pred60,
                            routingScore: routingScore,
                            routingReason: routingReason,
                            hourlyCurve: hourlyCurve,
                            hasCurve: hasCurve,
                            curveSamples: allPoints.length,
                            aiIntel: generateTacticalIntelligence(ride),
                            analytics: { low: lowMarker, high: highMarker, avg: avgMarker, bestHour: bestHourStr, worstHour: worstHourStr, samples: allPoints.length, timeSpan: timeSpanStr }
                        };
                    });

                    if (token !== syncTokenRef.current) return;
                    setRides(computedRides);
                    setLastSync(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    setLastLiveSyncTime(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    addLog(`[CRON] Telemetry sync matrix compiled successfully.`, 'success');
                } catch (err) {
                    if (!isSilent) setError(err.message);
                    addLog(`[ERR] Background synchronization failure: ${err.message}`, 'error');
                } finally {
                    if (!isSilent) setLoading(false);
                }
            };

            const bootSystemRef = useRef(null);
            bootSystemRef.current = bootSystem;
            useEffect(() => {
                bootSystemRef.current();
            }, [activeRegion]);

            useEffect(() => {
                if (nextSyncSeconds === 0) {
                    setNextSyncSeconds(300);
                    bootSystemRef.current(true);
                }
            }, [nextSyncSeconds]);
            const telemetryStats = useMemo(() => {
                let oldest = Date.now();
                let newest = 0;
                let totalPoints = 0;
                const activeRegionParkIds = GLOBAL_PARKS[activeRegion].map(p => p.id);
                rides.forEach(r => {
                    if (activeRegionParkIds.includes(r.parkId)) {
                        const points = globalTelemetryLog[r.id] || [];
                        points.forEach(p => {
                            if (p.t < oldest) oldest = p.t;
                            if (p.t > newest) newest = p.t;
                            totalPoints++;
                        });
                    }
                });
                if (totalPoints === 0) return { daysLogged: 0, isReady: false };
                const days = Math.max(0.1, (newest - oldest) / 86400000);
                return { daysLogged: days, isReady: days >= 7 };
            }, [globalTelemetryLog, activeRegion, rides]);
            const forecastDaysRow = useMemo(() => {
                const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                const tzOffset = getTzOffsetMs(PARK_TZ[GLOBAL_PARKS[activeRegion][0].id] || 'UTC');
                const list = [];
                for (let i = 0; i < 7; i++) {
                    const future = new Date(Date.now() + tzOffset + (i * 86400000));
                    list.push({
                        index: i,
                        label: i === 0 ? "Today" : (i === 1 ? "Tomorrow" : dayNames[future.getUTCDay()]),
                        dateNum: future.getUTCDate()
                    });
                }
                return list;
            }, [activeRegion]);

                        const pts = (globalTelemetryLog[r.id] || []).filter(p => getParkDay(p.t, r.parkId) === dow && getParkHour(p.t, r.parkId) >= EARLIEST_PARK_HOUR);
                        if (pts.length) { telSum += pts.reduce((a, b) => a + b.w, 0) / pts.length; telCnt++; }
                        const stat = rideStat(r.parkId, r.name);
                        if (stat) { priSum += stat.avg * crowdDowFactor(r.parkId, dow); priCnt++; }
                    });
                    let avg = null;
                    if (telCnt >= 3) avg = telSum / telCnt;
                    else if (priCnt >= 1) avg = priSum / priCnt;
                    if (avg != null && (!best || avg < best.avg)) best = { index: i, avg: Math.round(avg) };
                }
                return best;
            }, [rides, globalTelemetryLog, telemetryStats.isReady, activeRegion]);
            const setRouteModeSafe = (mode) => {
                if (mode === 'manual') {
                    // Seed the manual order from the optimizer's current plan so you start
                    // from the best route and tweak from there
                    setManualOrder(prev => {
                        const next = { ...prev };
                        itinerary.forEach(z => {
                            if (!next[z.parkId]) next[z.parkId] = [];
                            if (!next[z.parkId].includes(z.zoneKey)) next[z.parkId] = [...next[z.parkId], z.zoneKey];
                        });
                        return next;
                    });
                    addLog(`[SYS] Manual routing engaged. Reorder lands with the arrows.`, 'info');

                    addLog(`[SYS] Auto-optimizer re-engaged.`, 'success');

                setRouteMode(mode);

                    const i = arr.indexOf(zoneKey);
                    if (i < 0) return prev;
                    const j = i + dir;
                    if (j < 0 || j >= arr.length) return prev;

                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} strokeWidth="2" className="stroke-slate-300 dark:stroke-slate-700" />
                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} stroke="#10b981" strokeWidth="2" className="route-path-animation" />
                                    </g>
                                );
                            })}
                        </svg>
                        {mapData.map((node, i) => {
                            const activeNode = routePoints.find(p => p.match === node.match);
                            return (
                                <div key={`node-${i}`} className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style={{ left: `${node.x}%`, top: `${node.y}%` }}>
                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center font-black text-xs z-10 ${
                                        activeNode ? 'bg-emerald-500 border-emerald-300 text-white dark:text-black scale-110 shadow-md' : 'bg-slate-100 dark:bg-[#0f172a] border-slate-300 dark:border-slate-700 text-slate-400'
                                    }`}>
                                        {activeNode ? activeNode.step : '•'}
                                    </div>
                                    <span className={`mt-1 text-[8px] uppercase tracking-wider font-bold bg-white/80 dark:bg-[#05070a]/80 px-1 rounded ${activeNode ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-500 dark:text-slate-600'}`}>
                                        {node.label}
                                    </span>
                                </div>
                            );
                        })}
                    </div>
                );
            };
            const currentParkName = activePark !== 'all'
                ? (GLOBAL_PARKS[activeRegion].find(p => p.id.toString() === activePark) || {}).name || activeRegion
                : activeRegion;
            const findRideByText = (raw) => {
                const nq = normName(raw);
                const toks = new Set(nq.split(' ').filter(t => t.length > 2));
                let best = null, bc = 0;
                rides.forEach(r => {
                    if (activePark !== 'all' && r.parkId !== parseInt(activePark)) return;
                    const rn = normName(r.name);
                    let c = rn.split(' ').filter(t => t.length > 2).filter(t => toks.has(t)).length;
                    if (rn.length >= 5 && nq.includes(rn)) c += 3;
                    if (c > bc) { bc = c; best = r; }
                });
                return bc >= 2 ? best : null;
            };
            // Built-in "Overwatch AI": answers from live plan state + weather. No key, works offline.
            const answerQuery = (raw) => {
                const q = (raw || '').toLowerCase();
                const pick = (a) => a[Math.floor(Math.random() * a.length)];
                const inScope = (r) => activePark === 'all' || r.parkId === parseInt(activePark);
                const openPool = rides.filter(r => inScope(r) && r.is_open);
                const nextRide = masterSequence[0];
                const remainingPri = masterSequence.filter(r => r.isPriority).length;
                const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const wdShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const wdOf = (t) => new Date(t + 'T12:00:00').getDay();
                const tagStr = (r) => ((r.aiIntel && r.aiIntel.tags) || []).join(' ').toLowerCase() + ' ' + ((r.aiIntel && r.aiIntel.env) || '').toLowerCase();
                const listRides = (arr) => arr.map(r => `**${r.name}** ${Math.round(r.wait_time)}m`).join(', ');
                // Narrow a pool to a ride category mentioned in the query (thrill / family / indoor).
                const catFilter = (arr) => {
                    if (/(thrill|coaster|roller|intense|adrenaline|scary|fastest|big ride|high g)/.test(q)) return arr.filter(r => /thrill|high intensity|drop tower/.test(tagStr(r)));
                    if (/(family|kids?|children|gentle|chill|relax|toddler|little ones|calm|all ages)/.test(q)) return arr.filter(r => /family|relax|all ages/.test(tagStr(r)));
                    if (/(indoor|inside|dark ride)/.test(q)) return arr.filter(r => /indoor|climate|show building/.test((r.aiIntel && r.aiIntel.env || '').toLowerCase()));
                    return arr;
                };
                const catWord = /(thrill|coaster|roller|intense|adrenaline)/.test(q) ? 'thrill ' : /(family|kids?|children|gentle|toddler)/.test(q) ? 'family ' : /(indoor|dark ride)/.test(q) ? 'indoor ' : '';

                // GREETING / THANKS / IDENTITY
                if (/^(hi|hey|hello|yo|sup|howdy|greetings|good (morning|afternoon|evening)|overwatch)\b/.test(q) || /(you there|anyone there|status\?)/.test(q)) {
                    return pick(["Copy that, agent. ", "Overwatch online. ", "Reading you five-by-five. ", "Standing by. "]) + (nextRide ? `Next objective: **${nextRide.name}**${typeof nextRide.plannedWait === 'number' ? ` (~${nextRide.plannedWait}m, ETA ${nextRide.plannedEta})` : ''}.` : `You're deployed at ${currentParkName}. Ask me what to ride, the weather, or park status.`);
                }
                if (/(thank|thanks|cheers|nice one|appreciate|legend|good bot)/.test(q)) return pick(["Copy that — happy touring. ", "Any time, agent. ", "Roger. Stay sharp out there. ", "Affirmative. Enjoy the mission. "]);
                if (/(who are you|what are you|what can you do|\bhelp\b|capabilities|commands|options|how do you work)/.test(q)) {
                    return "I'm **Overwatch**, your live tactical advisor — I read your plan, GPS and weather. Try: *what should I ride next*, *nearest ride*, *weather tomorrow / on Saturday*, *is the park open*, *closing time*, *shortest waits*, *thrill rides*, *family rides*, *what if it rains*, *quietest day*, *my progress*, *Space Mountain or Big Thunder*, or ask about any ride by name.";
                }

                // RAIN / INDOOR PLAN (before the weather report so 'if it rains' gives ride picks)
                if (/(indoor|inside|if it rain|when it rain|rain plan|rainy day|stay dry|shelter|what.*do.*rain|dry rides)/.test(q)) {
                    const indoor = openPool.filter(r => /indoor|climate|show building/.test((r.aiIntel && r.aiIntel.env || '').toLowerCase())).sort((a, b) => a.wait_time - b.wait_time).slice(0, 5);
                    return indoor.length ? `If the skies open, stay dry on: ${listRides(indoor)}. Dark rides and show buildings keep the day moving in the rain.` : "Most rides here are outdoor — in heavy rain, hole up in indoor shows, restaurants or shops until it passes.";
                }

                // WEATHER (day-aware: today / tomorrow / weekday / week / weekend)
                if (/(weather|rain|raining|temperature|\btemp\b|hot|cold|sunny|forecast|umbrella|poncho|wet|snow|wind|climate|degrees|sun\b|cloud)/.test(q)) {
                    if (weatherErr) return "I can't reach the weather service right now — try again shortly.";
                    if (!weather || !weather.current || !weather.daily) return "Fetching the latest weather — ask again in a second.";
                    const c = weather.current, d = weather.daily;
                    const rainAt = (i) => d.precipitation_probability_max ? d.precipitation_probability_max[i] : null;
                    const describeDay = (i, labelOverride) => {
                        const wi = weatherInfo(d.weather_code[i]).label.toLowerCase();
                        const rain = rainAt(i);
                        const label = labelOverride || (i === 0 ? 'today' : dayNames[wdOf(d.time[i])]);
                        let s = `**${currentParkName}** ${label}: ${Math.round(d.temperature_2m_min[i])}–${Math.round(d.temperature_2m_max[i])}°C, ${wi}`;
                        if (rain != null) s += `, ${rain}% chance of rain`;
                        s += '.';
                        if (rain != null && rain >= 50) s += ` Keep indoor rides in your back pocket.`;
                        else if (d.temperature_2m_max[i] >= 28) s += ` Hot one — hydrate and hit water rides midday.`;
                        else if (d.temperature_2m_max[i] <= 8) s += ` Wrap up warm.`;
                        return s;
                    };
                    if (/(week|coming days|next few days|outlook|rest of the week)/.test(q) && !/tomorrow/.test(q)) {
                        const rows = d.time.slice(0, 7).map((t, i) => `${i === 0 ? 'Today' : wdShort[wdOf(t)]} ${Math.round(d.temperature_2m_max[i])}°/${Math.round(d.temperature_2m_min[i])}°${rainAt(i) != null ? ` ${rainAt(i)}%` : ''}`);
                        let dry = 0, m = Infinity;
                        if (d.precipitation_probability_max) d.precipitation_probability_max.forEach((p, i) => { if (p < m) { m = p; dry = i; } });
                        return `7-day outlook for **${currentParkName}**: ${rows.join(' · ')}. Driest bet is **${dry === 0 ? 'today' : dayNames[wdOf(d.time[dry])]}** (${m}% rain).`;
                    }
                    if (/weekend/.test(q)) {
                        const out = []; d.time.forEach((t, i) => { const wd = wdOf(t); if (wd === 6 || wd === 0) out.push(describeDay(i)); });
                        return out.length ? out.join(' ') : "No weekend days fall inside the 7-day window.";
                    }
                    if (/tomorrow/.test(q) && d.time.length > 1) return describeDay(1, 'tomorrow');
                    let namedIdx = -1;
                    for (let k = 0; k < 7; k++) { if (q.includes(dayNames[k].toLowerCase())) { for (let i = 0; i < d.time.length; i++) { if (wdOf(d.time[i]) === k) { namedIdx = i; break; } } break; } }
                    if (namedIdx >= 0) return describeDay(namedIdx);
                    if (/(hottest|warmest|coldest|coolest)/.test(q)) {
                        const want = /(hottest|warmest)/.test(q);
                        let bi = 0; d.temperature_2m_max.forEach((v, i) => { if (want ? v > d.temperature_2m_max[bi] : v < d.temperature_2m_max[bi]) bi = i; });
                        return `${want ? 'Warmest' : 'Coolest'} of the next 7 days is **${bi === 0 ? 'today' : dayNames[wdOf(d.time[bi])]}** at ${Math.round(d.temperature_2m_max[bi])}°C.`;
                    }
                    const lbl = weatherInfo(c.weather_code).label.toLowerCase();
                    let s = `**${currentParkName}** right now: **${Math.round(c.temperature_2m)}°C**, ${lbl}` + (typeof c.apparent_temperature === 'number' ? ` (feels ${Math.round(c.apparent_temperature)}°C)` : '') + '.';
                    s += ` Today ${Math.round(d.temperature_2m_min[0])}–${Math.round(d.temperature_2m_max[0])}°C`;
                    if (rainAt(0) != null) s += `, ${rainAt(0)}% rain`;
                    s += '.';
                    if (typeof c.wind_speed_10m === 'number' && c.wind_speed_10m >= 35) s += ` Heads up: strong winds (${Math.round(c.wind_speed_10m)} km/h) can pause outdoor coasters.`;
                    if (rainAt(0) != null && rainAt(0) >= 50) s += ` Good day to bank **indoor** rides.`;
                    return s;
                }

                // CLOSING TIME (before generic open/closed)
                if (/(closing time|what time.*(close|shut|end)|when.*(close|shut|end)|park hours|opening hours|how late)/.test(q)) {
                    const parts = GLOBAL_PARKS[activeRegion].map(p => {
                        const r = rides.find(x => x.parkId === p.id);
                        if (!r || typeof r.minsToClose !== 'number' || r.minsToClose <= 0 || r.minsToClose >= 900) return `${p.name}: closed / no schedule`;
                        const close = new Date(Date.now() + r.minsToClose * 60000 + getTzOffsetMs(PARK_TZ[p.id] || 'UTC'));
                        const hh = close.getUTCHours().toString().padStart(2, '0'), mm = close.getUTCMinutes().toString().padStart(2, '0');
                        return `${p.name}: closes **${hh}:${mm}** (${Math.floor(r.minsToClose / 60)}h ${Math.round(r.minsToClose % 60)}m from now)`;
                    });
                    return 'Closing — ' + parts.join(' · ') + '.';
                }
                if (/(is.*open|are.*open|open now|open yet|is.*closed|are.*closed|park status|which.*open|\bshut\b)/.test(q)) {
                    return 'Park status — ' + GLOBAL_PARKS[activeRegion].map(p => `${p.name}: **${(parkStatus[p.id] || 'unknown').toUpperCase()}**`).join(' · ') + '.';
                }

                // NEAREST + DISTANCE-TO-A-RIDE
                if (/(nearest|closest|near me|around me|by me|what.*close.*me)/.test(q)) {
                    if (nearestRide) return `Closest un-ridden target: **${nearestRide.ride.name}** in ${nearestRide.ride.landName} — ${nearestRide.dir} ${nearestRide.distLabel}, ${nearestRide.timeLabel}, currently ${Math.round(nearestRide.ride.wait_time)}m wait.`;
                    return gpsEnabled ? "GPS is on but I don't have a fix yet — give it a moment." : "Turn on **GPS** (top-right) and I'll point you to the closest un-ridden ride.";
                }
                if (/(how far|how close|distance to|which way|direction to|\bfar\b)/.test(q)) {
                    const r = findRideByText(raw);
                    if (r) { const g = gpsForRide(r); return g ? `**${r.name}** is ${g.dir} of you — ${g.distLabel}, about ${g.timeLabel}.` : (gpsEnabled ? "I need a live GPS fix to measure that." : "Turn on **GPS** and I'll give you distance and direction to any ride."); }
                }

                // NEXT / RECOMMENDATION
                if (/(next|what.*(ride|do|now)|where.*go|recommend|should i (ride|do|go)|first ride|start with)/.test(q)) {
                    if (!nextRide) return "No active objectives right now — the park may be closed or everything's done. Check the sector selection.";
                    let s = `Next up: **${nextRide.name}** (${nextRide.landName})`;
                    s += typeof nextRide.plannedWait === 'number' ? ` — ETA ${nextRide.plannedEta}, ~${nextRide.plannedWait}m queue.` : ` — ${Math.round(nextRide.wait_time)}m now.`;
                    if (masterSequence[1]) s += ` Then **${masterSequence[1].name}**.`;
                    if (nearestRide && nearestRide.ride.id !== nextRide.id) s += ` (Closest to you is ${nearestRide.ride.name}, ${nearestRide.distLabel}.)`;
                    return s;
                }

                // COMPARISON: X or Y
                if (/\bor\b/.test(q)) {
                    const bits = raw.split(/\bor\b/i);
                    if (bits.length === 2) {
                        const ra = findRideByText(bits[0]), rb = findRideByText(bits[1]);
                        if (ra && rb && ra.id !== rb.id) {
                            const wa = ra.is_open ? Math.round(ra.wait_time) : null, wb = rb.is_open ? Math.round(rb.wait_time) : null;
                            if (wa == null) return `**${ra.name}** is closed — take **${rb.name}** (${wb}m).`;
                            if (wb == null) return `**${rb.name}** is closed — take **${ra.name}** (${wa}m).`;
                            const win = wa <= wb ? ra : rb;
                            return `Take **${win.name}** first — ${Math.min(wa, wb)}m now vs ${Math.max(wa, wb)}m for ${(win === ra ? rb : ra).name}. Double back for the other after.`;
                        }
                    }
                }

                // BEST / TOP PICKS (priority + low wait, category-aware). Not "best day".
                if (/(best|top|must[ -]?do|greatest|worth it|worth riding|what.*good|recommend.*ride|highlight)/.test(q) && !/\bday\b/.test(q)) {
                    let poolB = catFilter(openPool.filter(r => r.isPriority));
                    if (!poolB.length) poolB = catFilter(openPool);
                    poolB = poolB.slice().sort((a, b) => a.wait_time - b.wait_time).slice(0, 6);
                    return poolB.length ? `Top ${catWord}picks right now (priority first, lowest wait): ${listRides(poolB)}. Hit these before the lines build.` : "Nothing open matches that right now.";
                }
                // SHORTEST / LONGEST WAITS (respect any category in the query)
                if (/(shortest|lowest|quickest|smallest|least|walk ?on|quick win|easy win|any short|what.*quick)/.test(q)) {
                    const s = catFilter(openPool).slice().sort((a, b) => a.wait_time - b.wait_time).slice(0, 6);
                    return s.length ? `Shortest ${catWord}waits right now: ${listRides(s)}. Grab these while they're cheap.` : `No open ${catWord}rides to compare yet.`;
                }
                if (/(longest|highest|busiest|worst|biggest|most crowded|what.*avoid)/.test(q)) {
                    const s = catFilter(openPool).slice().sort((a, b) => b.wait_time - a.wait_time).slice(0, 6);
                    return s.length ? `Biggest ${catWord}lines to avoid or save for later: ${listRides(s)}.` : `No open ${catWord}rides to compare yet.`;
                }

                // THRILL / FAMILY (plain "thrill rides" / "family rides")
                if (/(thrill|coaster|roller|intense|adrenaline|scary|fastest|big ride|high g)/.test(q)) {
                    const t = openPool.filter(r => /thrill|high intensity|drop tower/.test(tagStr(r))).sort((a, b) => a.wait_time - b.wait_time).slice(0, 6);
                    return t.length ? `Thrill lineup, quietest first: ${listRides(t)}.` : "No open thrill rides match right now.";
                }
                if (/(family|kids?|children|gentle|chill|relax|toddler|little ones|calm|slow ride|all ages)/.test(q)) {
                    const f = openPool.filter(r => /family|relax|all ages/.test(tagStr(r))).sort((a, b) => a.wait_time - b.wait_time).slice(0, 6);
                    return f.length ? `Family-friendly and low wait: ${listRides(f)}.` : "Nothing tagged family is open at the moment.";
                }

                // NAMED RIDE (wins over generic totals/busy phrasing)
                const namedRide = findRideByText(raw);
                if (namedRide) {
                    if (!namedRide.is_open) return `**${namedRide.name}** is currently **closed**. I'll flag it the moment it reopens.`;
                    let s = `**${namedRide.name}** — ${Math.round(namedRide.wait_time)}m now`;
                    if (typeof namedRide.projection60m === 'number') s += `, trending to ~${namedRide.projection60m}m within the hour`;
                    s += `. ${namedRide.routingReason}.`;
                    if (namedRide.analytics && namedRide.analytics.bestHour !== 'Calibrating') s += ` Historically quietest around **${namedRide.analytics.bestHour}** (~${namedRide.analytics.low}m), busiest ${namedRide.analytics.worstHour} (~${namedRide.analytics.high}m).`;
                    const g = gpsForRide(namedRide);
                    if (g) s += ` It's ${g.dir} of you, ${g.distLabel}.`;
                    return s;
                }

                // TOTALS / PROGRESS / PRIORITIES / QUIET DAY / BREAKS
                if (/(how long|total|queue time|saved|efficien|walking|time.*queue)/.test(q)) {
                    return `Plan totals — expected queueing **${Math.floor(metrics.totalQueueTimeMins / 60)}h ${metrics.totalQueueTimeMins % 60}m**, walking ~${Math.floor(metrics.walkMins / 60)}h ${metrics.walkMins % 60}m, roughly **${Math.floor(metrics.totalSavedMins / 60)}h ${metrics.totalSavedMins % 60}m saved** vs an unplanned day.`;
                }
                if (/(progress|sitrep|status report|how.*going|how many.*(done|complete|left)|percent|completion)/.test(q)) {
                    const done = completedTargets.size, total = done + masterSequence.length, pct = total ? Math.round(done / total * 100) : 0;
                    return `Sitrep: **${done}** cleared, **${masterSequence.length}** remaining (${pct}% complete), ${remainingPri} of those priority targets. ${masterSequence.length ? `Next is ${nextRide.name}.` : 'Route complete — outstanding work.'}`;
                }
                if (/(left|remaining|priorit|objective)/.test(q)) {
                    return `**${remainingPri}** priority targets are queued on the active route and ${completedTargets.size} are logged complete (${masterSequence.length} objectives total).`;
                }
                if (/(busy|crowd|quiet|best day|which day|when.*go|less busy|avoid.*crowd)/.test(q)) {
                    if (recommendedDay && forecastDaysRow[recommendedDay.index]) return `Quietest of the next 7 days looks like **${forecastDaysRow[recommendedDay.index].label}** (~${recommendedDay.avg}m average across priority rides). Open the Forecast tab for the full breakdown.`;
                    return "I need ~7 days of telemetry before I can call the quietest day — the forecast model is still calibrating.";
                }
                if (/(break|lunch|dinner|\beat\b|food|\brest\b|hungry|snack)/.test(q)) {
                    const on = Object.keys(breaks).filter(k => breaks[k]).map(k => `${BREAK_DEFS[k].label} ~${fmtHM(BREAK_DEFS[k].atMin)}`);
                    customBreaks.slice().sort((a, b) => a.atMin - b.atMin).forEach(b => on.push(`${b.label} ${fmtHM(b.atMin)} (${b.mins}m)`));
                    return on.length ? `Breaks scheduled: ${on.join(', ')}. Every ride after a break is re-timed for your true later arrival — smart move.` : "No breaks scheduled — toggle **Lunch/Dinner** or add a custom time+duration in the Breaks panel and I'll fold them in.";
                }

                // IMPROVED FALLBACK: loose ride guess, else contextual help
                const nq = normName(raw);
                const toks = new Set(nq.split(' ').filter(t => t.length > 2));
                let guess = null, gc = 0;
                rides.forEach(r => { if (!inScope(r)) return; const c = normName(r.name).split(' ').filter(t => t.length > 2).filter(t => toks.has(t)).length; if (c > gc) { gc = c; guess = r; } });
                if (guess && gc >= 1) return `Did you mean **${guess.name}**? It's ${guess.is_open ? `${Math.round(guess.wait_time)}m now` : 'currently closed'}. Ask "how busy is ${guess.name}" for the full read.`;
                let tail = '';
                if (weather && weather.current) tail = ` It's ${Math.round(weather.current.temperature_2m)}°C at ${currentParkName} right now.`;
                return `I didn't catch a specific request.${tail} I can cover: **next ride**, **nearest**, **weather** (today/tomorrow/any day), **park open/closing**, **shortest/longest waits**, **thrill/family/indoor** picks, **quietest day**, **progress**, or any **ride by name**.`;
            };
            // Compact live-state snapshot the LLM reasons over (grounding).
            const buildAiContext = () => {
                const L = [];
                L.push(`Region: ${activeRegion}. Viewing: ${activePark === 'all' ? 'Full resort' : currentParkName}. Local time now: ${new Date().toLocaleTimeString('en-GB', { hour12: false })}.`);
                GLOBAL_PARKS[activeRegion].forEach(p => {
                    const r = rides.find(x => x.parkId === p.id);
                    let close = '';
                    if (r && typeof r.minsToClose === 'number' && r.minsToClose > 0 && r.minsToClose < 900) {
                        const c = new Date(Date.now() + r.minsToClose * 60000 + getTzOffsetMs(PARK_TZ[p.id] || 'UTC'));
                        close = ` (closes ${String(c.getUTCHours()).padStart(2, '0')}:${String(c.getUTCMinutes()).padStart(2, '0')})`;
                    }
                    L.push(`Park ${p.name}: ${(parkStatus[p.id] || 'unknown')}${close}.`);
                });
                if (weather && weather.current && weather.daily) {
                    const c = weather.current, d = weather.daily;
                    const wd = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    L.push(`Weather now: ${Math.round(c.temperature_2m)}C ${weatherInfo(c.weather_code).label}${d.precipitation_probability_max ? ', today ' + d.precipitation_probability_max[0] + '% rain' : ''}.`);
                    L.push('7-day: ' + d.time.slice(0, 7).map((t, i) => `${i === 0 ? 'today' : wd[new Date(t + 'T12:00:00').getDay()]} ${Math.round(d.temperature_2m_max[i])}/${Math.round(d.temperature_2m_min[i])}C ${d.precipitation_probability_max ? d.precipitation_probability_max[i] + '%' : ''}`).join('; ') + '.');
                }
                L.push(`Plan: expected queue ${Math.floor(metrics.totalQueueTimeMins / 60)}h${metrics.totalQueueTimeMins % 60}m, walking ${Math.floor(metrics.walkMins / 60)}h${metrics.walkMins % 60}m, saved ~${Math.floor(metrics.totalSavedMins / 60)}h${metrics.totalSavedMins % 60}m. Completed ${completedTargets.size}. Objectives left ${masterSequence.length}.`);
                const steps = masterSequence.slice(0, 6).map((r, i) => `${i + 1}. ${r.name} (${r.landName}) ETA ${r.plannedEta || '-'} ~${typeof r.plannedWait === 'number' ? r.plannedWait : Math.round(r.wait_time)}m`);
                if (steps.length) L.push('Next steps: ' + steps.join('; ') + '.');
                if (nearestRide) L.push(`Nearest un-ridden: ${nearestRide.ride.name} ${nearestRide.dir} ${nearestRide.distLabel} (${nearestRide.timeLabel}).`);
                if (recommendedDay && forecastDaysRow[recommendedDay.index]) L.push(`Quietest upcoming day: ${forecastDaysRow[recommendedDay.index].label} (~${recommendedDay.avg}m avg).`);
                const on = Object.keys(breaks).filter(k => breaks[k]).map(k => `${BREAK_DEFS[k].label} ~${fmtHM(BREAK_DEFS[k].atMin)} ${BREAK_DEFS[k].mins}m`);

                                            {calculatedForecastData
                                                .filter(r => activePark === 'all' || r.parkId.toString() === activePark)
                                                .map(ride => (
                                                    <div key={ride.id} className="bg-slate-50 dark:bg-[#05070a] border border-slate-200 dark:border-slate-800/50 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                                                        <div className="min-w-0 pr-2">
                                                            <h4 className="font-bold text-sm text-slate-900 dark:text-slate-200 truncate">{ride.name}</h4>
                                                            <p className="text-[10px] text-slate-400 font-mono mt-0.5 truncate">{ride.landName}</p>
                                                            <span className={`inline-block text-[9px] font-black uppercase rounded mt-2 px-1.5 py-0.5 ${
                                                                ride.verdict.includes("Very busy") ? "bg-rose-100 dark:bg-rose-950/30 text-rose-600" :
                                                                ride.verdict.includes("Busy") ? "bg-amber-100 dark:bg-amber-950/30 text-amber-600" :
                                                                "bg-emerald-100 dark:bg-emerald-950/30 text-emerald-600"
                                                            }`}>
                                                                {ride.verdict}
                                                            </span>
                                                        </div>
                                                        <div className="text-right shrink-0 font-mono">
                                                            <div className="text-xl font-black text-slate-800 dark:text-slate-100">{ride.forecastAvg}m</div>
                                                            <div className="text-[9px] text-slate-400 uppercase tracking-wider">Peak: {ride.forecastPeak}m</div>
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                        <div className="mt-12 border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-[#0c111a] overflow-hidden">
                            <button onClick={() => setShowTerminal(!showTerminal)} className="w-full flex justify-between p-3 text-[10px] font-mono tracking-widest text-slate-500 dark:text-slate-400 uppercase border-b border-slate-200 dark:border-transparent">
                                <span>Network Daemon Logs</span> <span>[TOGGLE]</span>
                            </button>
                            {showTerminal && (
                                <div ref={logsEndRef} className="p-4 bg-slate-100 dark:bg-[#020408] h-48 overflow-y-auto font-mono text-[10px] terminal-scroll shadow-inner">
                                    {logs.map((log, i) => (
                                        <div key={i} className="flex gap-2 text-slate-500">
                                            <span>[{log.time}]</span> <span className={log.type === 'success' ? 'text-emerald-500' : log.type === 'error' ? 'text-rose-500' : log.type === 'warn' ? 'text-amber-500' : ''}>{log.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <p className="mt-4 text-center text-[9px] font-mono uppercase tracking-widest text-slate-400 dark:text-slate-600">
                            Live &amp; historical wait data powered by <a href="https://queue-times.com/" target="_blank" rel="noopener" className="underline hover:text-emerald-500">Queue-Times.com</a> &middot; Park schedules via <a href="https://themeparks.wiki/" target="_blank" rel="noopener" className="underline hover:text-emerald-500">ThemeParks.wiki</a> &middot; Weather via <a href="https://open-meteo.com/" target="_blank" rel="noopener" className="underline hover:text-emerald-500">Open-Meteo</a>
                        </p>
                    </div>
                    <div className={`fixed bottom-0 right-0 md:bottom-6 md:right-6 w-full md:w-[400px] bg-white dark:bg-[#0c111a] border border-slate-200 dark:border-slate-800 rounded-t-2xl md:rounded-2xl shadow-2xl transition-all duration-300 z-50 flex flex-col ${isChatOpen ? 'opacity-100 h-[80vh] md:h-[560px]' : 'opacity-0 pointer-events-none h-0'}`}>
                        <div className="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-800 bg-emerald-500/10 rounded-t-2xl">
                            <h3 className="text-sm font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest flex items-center gap-2">
                                <Icon path={I.Cpu} size={16} className={isThinking ? 'animate-pulse' : ''} /> Overwatch AI
                                <span className={`text-[8px] font-black px-1.5 py-0.5 rounded uppercase ${aiEnabled ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400' : 'bg-slate-100 dark:bg-slate-800 text-slate-400'}`}>{aiEnabled ? (aiProvider === 'gemini' ? 'Gemini' : 'AI') : 'Local'}</span>
                            </h3>
                            <div className="flex items-center gap-1">
                                <button onClick={() => setShowAiSettings(s => !s)} aria-label="AI settings" title="AI settings" className="text-slate-400 hover:text-emerald-500 p-1"><Icon path={I.Settings} size={16} /></button>
                                <button onClick={() => setIsChatOpen(false)} aria-label="Close assistant" title="Close" className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1"><Icon path={I.X} size={18} /></button>
                            </div>
                        </div>
                        <div ref={chatScrollRef} className="flex-grow overflow-y-auto p-4 space-y-4 text-sm bg-slate-50/50 dark:bg-[#05070a]/50 terminal-scroll">
                            {showAiSettings && (
                                <div className="bg-white dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-xs space-y-2 shadow-sm">
                                    <p className="font-black text-slate-700 dark:text-slate-300 uppercase tracking-wider text-[10px]">Open-response mode (optional)</p>
                                    <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-relaxed">Bring your own key for free-form answers. Stored only on this device. Without a key, the built-in offline assistant answers.</p>
                                    <select value={aiProvider} onChange={e => setAiProvider(e.target.value)} className="w-full bg-slate-100 dark:bg-[#05070a] border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-mono focus:outline-none focus:border-emerald-500">
                                        <option value="gemini">Google Gemini</option>
                                        <option value="openai">OpenAI-compatible (OpenRouter / proxy)</option>
                                    </select>
                                    {aiProvider === 'gemini' ? (
                                        <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-relaxed">Free <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" className="underline text-emerald-500">Google AI Studio</a> key.</p>
                                    ) : (
                                        <>
                                            <input type="text" value={aiBaseUrl} onChange={e => setAiBaseUrl(e.target.value)} placeholder="base URL (e.g. https://openrouter.ai/api/v1)" className="w-full bg-slate-100 dark:bg-[#05070a] border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-mono focus:outline-none focus:border-emerald-500" />
                                            <p className="text-[10px] text-amber-600 dark:text-amber-400 leading-relaxed">Note: <strong>api.openai.com cannot be called from a browser</strong> (no CORS). Use <a href="https://openrouter.ai/keys" target="_blank" rel="noopener" className="underline">OpenRouter</a> (browser-friendly, routes to GPT/Claude/Gemini) or your own proxy.</p>
                                        </>
                                    )}
                                    <input type="password" value={aiKey} onChange={e => setAiKey(e.target.value)} placeholder={aiProvider === 'gemini' ? 'Gemini API key' : 'API key (e.g. OpenRouter sk-or-…)'} className="w-full bg-slate-100 dark:bg-[#05070a] border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-mono focus:outline-none focus:border-emerald-500" />
                                    <input type="text" value={aiModel} onChange={e => setAiModel(e.target.value)} placeholder={aiProvider === 'gemini' ? 'model (e.g. gemini-flash-latest)' : 'model (e.g. openai/gpt-4o-mini)'} className="w-full bg-slate-100 dark:bg-[#05070a] border border-slate-300 dark:border-slate-700 rounded-lg px-2 py-1.5 text-[11px] font-mono focus:outline-none focus:border-emerald-500" />
                                    <p className="text-[9px] text-slate-400 dark:text-slate-500 leading-relaxed">{aiProvider === 'gemini' ? <><strong>gemini-flash-latest</strong> tracks the current model. Free-tier limits are low (a few req/min); <strong>gemini-3.5-flash-lite</strong> has the highest free limits.</> : <>OpenRouter model IDs like <strong>openai/gpt-4o-mini</strong>, <strong>anthropic/claude-3.5-haiku</strong>, or a free one like <strong>meta-llama/llama-3.3-70b-instruct:free</strong>.</>}</p>
                                    {aiProvider === 'gemini' && (
                                        <label className="flex items-center gap-2 text-[10px] text-slate-600 dark:text-slate-400 cursor-pointer">
                                            <input type="checkbox" checked={aiSearch} onChange={e => setAiSearch(e.target.checked)} className="accent-emerald-500 w-3.5 h-3.5" />
                                            Live web search (parade times etc.) — <span className="text-amber-500">uses extra quota</span>
                                        </label>
                                    )}
                                    <div className="flex gap-2 items-center">
                                        <button onClick={testAiKey} disabled={!aiEnabled} className="bg-blue-600 hover:bg-blue-500 disabled:opacity-40 text-white rounded-lg py-1.5 px-3 text-[10px] font-black uppercase tracking-wider">Test</button>
                                        <button onClick={() => setShowAiSettings(false)} className="flex-grow bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg py-1.5 text-[10px] font-black uppercase tracking-wider">Done</button>
                                        {aiKey && <button onClick={() => { setAiKey(''); setAiTestResult(''); }} className="text-[10px] font-bold text-rose-500 border border-rose-300 dark:border-rose-800 rounded-lg px-2 py-1.5">Clear</button>}
                                    </div>
                                    {aiTestResult && <p className={`text-[10px] font-mono leading-relaxed break-words ${aiTestResult.startsWith('✓') ? 'text-emerald-600 dark:text-emerald-400' : aiTestResult.startsWith('✗') ? 'text-rose-500' : 'text-slate-400'}`}>{aiTestResult}</p>}
                                    <p className="text-[9px] text-slate-400 dark:text-slate-500 leading-relaxed">Note: a browser-side key is visible on this device — use a key with only the Generative Language API enabled and <strong>no HTTP-referrer restriction</strong> (referrer limits block browser calls), and revoke it if you share the page.</p>
                                </div>
                            )}
                            {chatHistory.length === 0 && (
                                <div className="text-center text-slate-400 dark:text-slate-500 font-mono text-xs my-6">
                                    <Icon path={I.Activity} size={24} className="mx-auto mb-2 opacity-50" />
                                    <p className="mb-1 text-emerald-500 font-bold">SECURE COMMS ESTABLISHED.</p>
                                    <p>I read your live plan, GPS, and weather.</p>
                                    <div className="mt-3 flex flex-wrap gap-1.5 justify-center">
                                        {["What should I ride next?", "Best rides right now", "Weather on Saturday?", "Closing time?", "Shortest wait for thrill rides", "What if it rains?", "My progress?"].map(s => (
                                            <button key={s} onClick={() => { setChatInput(s); setTimeout(handleAsk, 0); }} className="text-[10px] bg-white dark:bg-[#111827] border border-slate-200 dark:border-slate-800 rounded-full px-2.5 py-1 hover:border-emerald-400 text-slate-600 dark:text-slate-400">{s}</button>
                                        ))}
                                    </div>
                                    {!aiEnabled && <p className="mt-3 text-[9px] text-slate-400 dark:text-slate-500">Tip: add a free Gemini key via the <Icon path={I.Settings} size={9} className="inline" /> for open-ended answers &amp; live web lookups.</p>}
                                </div>
                            )}
                            {chatHistory.map((msg, i) => (
                                <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                    <div className={`max-w-[85%] rounded-xl px-4 py-2 shadow-sm ${msg.role === 'user' ? 'bg-emerald-600 text-white rounded-br-none' : 'bg-white dark:bg-[#111827] text-slate-800 dark:text-slate-300 border border-slate-200 dark:border-slate-800 rounded-bl-none leading-relaxed'}`}>
                                        <span dangerouslySetInnerHTML={{ __html: msg.parts[0].text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/\*\*(.*?)\*\*/g, '<strong class="text-emerald-600 dark:text-emerald-400">$1</strong>') }} />
                                    </div>
                                </div>
                            ))}
                            {isThinking && (
                                <div className="flex items-center gap-2 text-emerald-500 font-mono text-[10px] uppercase tracking-widest px-2">
                                    <Icon path={I.RefreshCw} size={12} className="animate-spin" /> Processing intel…
                                </div>
                            )}
                        </div>
                        <div className="p-3 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-[#0c111a] rounded-b-2xl flex gap-2">
                            <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAsk()} placeholder="Ask about your plan…" className="flex-grow bg-slate-100 dark:bg-[#05070a] border border-slate-300 dark:border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-800 dark:text-slate-200 focus:outline-none focus:border-emerald-500 shadow-inner" disabled={isThinking} />
                            <button onClick={handleAsk} disabled={isThinking || !chatInput.trim()} aria-label="Send message" className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white rounded-lg p-2 transition-colors shadow-sm"><Icon path={I.Send} size={16} /></button>
                        </div>
                    </div>
                    <button onClick={() => setIsChatOpen(prev => !prev)} aria-label="Open Overwatch AI assistant" title="Overwatch AI" className={`fixed bottom-6 right-6 md:bottom-8 md:right-8 bg-emerald-600 text-white p-4 rounded-full shadow-[0_0_20px_rgba(16,185,129,0.4)] hover:scale-110 transition-all z-40 ${isChatOpen ? 'opacity-0 pointer-events-none scale-50' : 'opacity-100 scale-100'}`}>
                        <Icon path={I.MessageSquare} size={24} />
                    </button>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
