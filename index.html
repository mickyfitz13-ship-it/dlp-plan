<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLP Tactical Optimizer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { colors: { emerald: { 400: '#34d399', 500: '#10b981', 600: '#059669' } } } }
      }
    </script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #f1f5f9; }
        .dark body { background-color: #05070a; }
        
        .route-path-animation { stroke-dasharray: 6 6; animation: dash 3s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -24; } }
        
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: transparent; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark .terminal-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

        :root { --grid-color: #e2e8f0; }
        .dark { --grid-color: #1e293b; }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- INLINE ICONS ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const I = {
            Navigation: '<polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>',
            Database: '<ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>',
            Activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
            BookOpen: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>',
            X: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
            Layers: '<polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline>',
            ChevronRight: '<polyline points="9 18 15 12 9 6"></polyline>',
            ChevronDown: '<polyline points="6 9 12 15 18 9"></polyline>',
            ChevronUp: '<polyline points="18 15 12 9 6 15"></polyline>',
            Terminal: '<polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>',
            MapIcon: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line>',
            Hourglass: '<path d="M5 22h14"></path><path d="M5 2h14"></path><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"></path><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"></path>',
            Footprints: '<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"></path><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"></path>',
            MapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle>',
            Target: '<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>',
            ShieldAlert: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>',
            Timer: '<line x1="10" y1="2" x2="14" y2="2"></line><line x1="12" y1="14" x2="15" y2="11"></line><circle cx="12" cy="14" r="8"></circle>',
            TrendingUp: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>',
            TrendingDown: '<polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline>',
            Minus: '<line x1="5" y1="12" x2="19" y2="12"></line>',
            RefreshCw: '<polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>',
            CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
            List: '<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>',
            Cpu: '<rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line>',
            BarChart: '<line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line>',
            Zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>',
            Info: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
            User: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>',
            Sun: '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>',
            Moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>',
            Monitor: '<rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line>',
            CheckSquare: '<polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>'
        };

        const PARK_IDS = [
            { id: 4, name: "Disneyland Park", slug: "disneyland-park" },
            { id: 28, name: "Disney Adventure World", slug: "walt-disney-studios" }
        ];

        // --- SPECIFIC RIDE DATABASE (UI Coords + Real Lat/Long + Run Time) ---
        const RIDE_DB = {
            "big thunder mountain": { priority: true, x: 15, y: 60, duration: 4, uptime: 0.85 },
            "phantom manor": { priority: true, x: 10, y: 70, duration: 6, uptime: 0.96 },
            "pirates of the caribbean": { priority: true, x: 20, y: 30, duration: 10, uptime: 0.95 },
            "indiana jones": { priority: true, x: 10, y: 20, duration: 2, uptime: 0.86 },
            "peter pan's flight": { priority: true, x: 45, y: 20, duration: 3, uptime: 0.97 },
            "star wars hyperspace mountain": { priority: true, x: 85, y: 45, duration: 3, uptime: 0.90 },
            "star tours": { priority: true, x: 90, y: 55, duration: 5, uptime: 0.98 },
            "buzz lightyear": { priority: true, x: 80, y: 65, duration: 5, uptime: 0.98 },
            "tower of terror": { priority: true, x: 40, y: 50, duration: 5, uptime: 0.98 },
            "ratatouille": { priority: true, x: 80, y: 20, duration: 5, uptime: 0.91 },
            "crush's coaster": { priority: true, x: 75, y: 40, duration: 3, uptime: 0.88 },
            "spider-man": { priority: true, x: 20, y: 30, duration: 4, uptime: 0.92 },
            "flight force": { priority: true, x: 15, y: 20, duration: 2, uptime: 0.89 }
        };

        const TACTICAL_COORDS = {
            4: [
                { match: "main street", x: 50, y: 85, label: "Main St.", lat: 48.8716, lng: 2.7779 },
                { match: "fantasy", x: 50, y: 20, label: "Fantasyland", lat: 48.8741, lng: 2.7758 },
                { match: "discovery", x: 85, y: 50, label: "Discoveryland", lat: 48.8735, lng: 2.7788 },
                { match: "adventure", x: 25, y: 35, label: "Adventureland", lat: 48.8732, lng: 2.7738 },
                { match: "frontier", x: 15, y: 65, label: "Frontierland", lat: 48.8717, lng: 2.7744 }
            ],
            28: [
                { match: "front lot", x: 50, y: 85, label: "Front Lot", lat: 48.8681, lng: 2.7808 },
                { match: "production", x: 30, y: 60, label: "Prod. Courtyard", lat: 48.8685, lng: 2.7797 },
                { match: "toon", x: 70, y: 60, label: "Toon Studio", lat: 48.8683, lng: 2.7813 },
                { match: "pixar", x: 80, y: 25, label: "Worlds of Pixar", lat: 48.8672, lng: 2.7806 },
                { match: "avengers", x: 20, y: 30, label: "Avengers Campus", lat: 48.8678, lng: 2.7783 }
            ]
        };

        const getCoords = (parkId, landName) => {
            const mapData = TACTICAL_COORDS[parkId];
            if (!mapData) return { x: 50, y: 50 };
            const coord = mapData.find(c => landName.toLowerCase().includes(c.match));
            return coord || { x: 50, y: 50 };
        };

        const getHaversineDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        };

        const getRideMetrics = (rideName, landName) => {
            const n = rideName.toLowerCase();
            const match = Object.keys(RIDE_DB).find(key => n.includes(key));
            if (match) return { isPriority: true, ...RIDE_DB[match] };
            const coords = getCoords(4, landName); 
            return { isPriority: false, x: coords.x, y: coords.y, duration: 3, uptime: 0.98 };
        };

        const generateTacticalIntelligence = (ride) => {
            const n = ride.name.toLowerCase();
            let brief = "Standard objective. Normal operational protocols apply.";
            let intel = "Secondary target. Queue density is generally stable.";
            let type = "Standard Ride";
            let env = "Mixed Architecture";

            if (ride.isSingleRider) {
                brief = "Solo operative queuing protocol. Designed to backfill empty seats in standard ride vehicles.";
                intel = "Throughput is highly volatile and depends entirely on odd-numbered standby groups. Use only if separated.";
                type = "Auxiliary Queue";
                env = "Bypass Corridor";
            } else if (n.includes("mountain") || n.includes("coaster") || n.includes("flight force") || n.includes("indiana")) {
                brief = "High-velocity kinetic experience. Endorphin spike expected. Secure all loose equipment prior to launch.";
                intel = "High-value tactical target. Traffic surges rapidly after park opening. Strike early or late.";
                type = "Thrill / High-G";
                env = "Dynamic / Outdoor Track";
            } else if (n.includes("phantom") || n.includes("tower")) {
                brief = "Atmospheric and psychological simulation. Low-light environment navigation required.";
                intel = "Hardware capacity is highly efficient. Wait times often stabilize in the mid-afternoon.";
                type = "Dark Ride / Drop";
                env = "Climate-Controlled Indoors";
            } else if (n.includes("peter pan") || n.includes("ratatouille") || n.includes("crush")) {
                brief = "High-value narrative track. Heavy civilian foot-traffic expected in this sector.";
                intel = "Capacity bottlenecks are common. Optimum execution time is during parade operations or meal hours.";
                type = "Scenic / Tracked";
                env = "Immersive Indoors";
            } else if (n.includes("pirates") || n.includes("small world") || n.includes("buzz") || n.includes("star tours")) {
                brief = "High-capacity continuous-load system. Rapid troop movement through the facility.";
                intel = "Excellent omnimover throughput. Even long physical lines will clear faster than expected.";
                type = "Omnimover / Boat";
                env = "Massive Indoor Show Building";
            } else if (ride.isMinor) {
                brief = "Secondary atmospheric objective. Ideal for operational cooldown and stamina recovery.";
                intel = "Low priority. Engage only if in the immediate vicinity and queue is minimal.";
                type = "Leisure / Viewing";
                env = "General Architecture";
            }
            return { brief, intel, type, env, duration: ride.duration + " mins" };
        };

        const PROXIES = [
            { name: "CorsProxy.io (Primary)", fetch: async (t) => await (await fetch(`https://corsproxy.io/?${encodeURIComponent(t)}`)).json() },
            { name: "AllOrigins GET (Fallback)", fetch: async (t) => JSON.parse((await (await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(t)}`)).json()).contents) }
        ];

        const App = () => {
            const [rides, setRides] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activePark, setActivePark] = useState('4'); 
            const [lastSync, setLastSync] = useState(null);
            const [showPrimer, setShowPrimer] = useState(false);
            const [expandedRideId, setExpandedRideId] = useState(null);

            // Theme Management
            const [theme, setTheme] = useState(() => localStorage.getItem('dlp_theme_v16') || 'system');
            
            useEffect(() => {
                localStorage.setItem('dlp_theme_v16', theme);
                const root = window.document.documentElement;
                if (theme === 'dark') root.classList.add('dark');
                else if (theme === 'light') root.classList.remove('dark');
                else window.matchMedia('(prefers-color-scheme: dark)').matches ? root.classList.add('dark') : root.classList.remove('dark');
            }, [theme]);

            const cycleTheme = () => {
                if (theme === 'system') setTheme('dark');
                else if (theme === 'dark') setTheme('light');
                else setTheme('system');
            };

            const getThemeIcon = () => theme === 'system' ? I.Monitor : (theme === 'dark' ? I.Moon : I.Sun);

            // GPS Logic
            const [gpsEnabled, setGpsEnabled] = useState(() => JSON.parse(localStorage.getItem('dlp_gps_v16') || 'false'));
            const [userGPS, setUserGPS] = useState(null);

            useEffect(() => {
                localStorage.setItem('dlp_gps_v16', JSON.stringify(gpsEnabled));
                let watchId;
                if (gpsEnabled) {
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => setUserGPS({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => addLog(`[WARN] GPS Signal lost or denied: ${err.message}`, 'warn'),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                    addLog(`[SYS] Satellite Tracking active. Syncing Dynamic Origin.`, 'success');
                } else {
                    setUserGPS(null);
                    addLog(`[SYS] Satellite Tracking offline. Reverting to manual sequencing.`, 'info');
                }
                return () => { if(watchId) navigator.geolocation.clearWatch(watchId); };
            }, [gpsEnabled]);

            const toggleGPS = () => setGpsEnabled(!gpsEnabled);

            const [completedTargets, setCompletedTargets] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_completed_v16') || '[]')));
            const [activatedMinors, setActivatedMinors] = useState(() => new Set(JSON.parse(localStorage.getItem('dlp_activated_v16') || '[]')));
            const [logs, setLogs] = useState([]);
            const [showTerminal, setShowTerminal] = useState(false);
            const logsEndRef = useRef(null);

            const buildHash = useMemo(() => {
                const d = new Date();
                return `BUILD ${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2, '0')}${d.getDate().toString().padStart(2, '0')}`;
            }, [lastSync]);

            useEffect(() => localStorage.setItem('dlp_completed_v16', JSON.stringify(Array.from(completedTargets))), [completedTargets]);
            useEffect(() => localStorage.setItem('dlp_activated_v16', JSON.stringify(Array.from(activatedMinors))), [activatedMinors]);

            const toggleExpand = (id) => setExpandedRideId(prev => prev === id ? null : id);
            
            const toggleRide = (e, rideId) => {
                e.stopPropagation(); 
                setCompletedTargets(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) { next.delete(rideId); addLog(`[SYS] Objective restored to active tracking sequence.`, 'success'); } 
                    else { next.add(rideId); addLog(`[SYS] Objective complete. Updating Dynamic Origin vector.`, 'info'); }
                    return next;
                });
            };

            const toggleMinor = (e, rideId) => {
                e.stopPropagation(); 
                setActivatedMinors(prev => {
                    const next = new Set(prev);
                    if (next.has(rideId)) { next.delete(rideId); addLog(`[SYS] Demoting attraction back to the background repository.`, 'info'); } 
                    else { next.add(rideId); addLog(`[SYS] Promoting attraction into active routing matrix.`, 'success'); }
                    return next;
                });
            };

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 3 });
                setLogs(prev => [...prev, { time, msg, type }]);
            };

            useEffect(() => { if (showTerminal && logsEndRef.current) logsEndRef.current.scrollIntoView({ behavior: "smooth" }); }, [logs, showTerminal]);

            const bootSystem = async (isSilent = false) => {
                if (!isSilent) setLoading(true);
                setError(null);
                addLog(`[SYS] Boot sequence initialized. Real-time Delta Queue engine active.`, 'info');

                try {
                    const allFetchedRides = [];
                    let parksOnline = 0;

                    for (const park of PARK_IDS) {
                        try {
                            let data = null;
                            for (const proxy of PROXIES) {
                                try {
                                    addLog(`[NET] Engaging node: ${proxy.name} for ${park.name}...`, 'info');
                                    data = await proxy.fetch(`https://queue-times.com/parks/${park.id}/queue_times.json`);
                                    if (data && data.lands) break;
                                } catch(e) { addLog(`[WARN] Node failure: ${e.message}`, 'warn'); }
                            }
                            if (!data || !data.lands) throw new Error("All network nodes exhausted.");
                            
                            parksOnline++;
                            
                            const processed = data.lands.flatMap(land => 
                                land.rides
                                    .filter(r => !r.name.toLowerCase().includes('single rider'))
                                    .map(r => {
                                        const metrics = getRideMetrics(r.name, land.name);
                                        return {
                                            ...r, 
                                            parkName: park.name, 
                                            parkId: park.id, 
                                            landName: land.name,
                                            isPriority: metrics.isPriority,
                                            isMinor: !metrics.isPriority,
                                            coords: { x: metrics.x, y: metrics.y },
                                            duration: metrics.duration,
                                            uptime: metrics.uptime
                                        };
                                    })
                            );
                            allFetchedRides.push(...processed);
                        } catch (e) { addLog(`[ERR] ${park.name} completely isolated.`, 'error'); }
                    }

                    if (parksOnline === 0) throw new Error("No operational telemetry returned from endpoint nodes.");
                    
                    // -- REAL-TIME DELTA Q MATH ENGINE --
                    const now = Date.now();
                    const history = JSON.parse(localStorage.getItem('dlp_history_v16') || '{}');
                    const newHistory = { ...history };
                    
                    // Fallback calculation if no history exists (Live Resort Load)
                    const openRides = allFetchedRides.filter(r => r.is_open);
                    const totalWait = openRides.reduce((sum, r) => sum + r.wait_time, 0);
                    const liveResortLoadFactor = openRides.length > 0 ? (totalWait / openRides.length) : 15;

                    const computedRides = allFetchedRides.map(ride => {
                        let mu_base = ride.isPriority ? 25 : 15;
                        const n = ride.name.toLowerCase();
                        if (n.includes('phantom') || n.includes('pirates') || n.includes('buzz') || n.includes('small world')) mu_base = 33; 
                        else if (n.includes('crush') || n.includes('peter pan')) mu_base = 13; 

                        const mu_eff = (ride.isPriority ? mu_base * 0.6 : mu_base) * ride.uptime;
                        const past = history[ride.id];
                        let lambda = 0;
                        let rho = 0;
                        let velocity = 0;

                        // Use historical wait delta if older than 1 min but less than 1 hour (prevent stale data)
                        if (past && past.wait !== undefined && (now - past.timestamp) > 60000 && (now - past.timestamp) < 3600000) {
                            const deltaQ = ride.wait_time - past.wait;
                            const deltaT = (now - past.timestamp) / 60000; // in minutes
                            
                            // True Empirical Arrival Velocity
                            lambda = Math.max(0, mu_eff * (1 + (deltaQ / deltaT)));
                            rho = mu_eff > 0 ? lambda / mu_eff : 0;
                            velocity = deltaQ / deltaT;
                        } else {
                            // First load fallback using real-time resort density
                            const baseAttraction = ride.isPriority ? 0.25 : 0.12;
                            lambda = Math.max(0, liveResortLoadFactor * (baseAttraction - ((baseAttraction / 180) * ride.wait_time))); 
                            rho = mu_eff > 0 ? lambda / mu_eff : 0;
                            velocity = rho - 1; 
                        }

                        // Store this sync's wait time for the next loop
                        newHistory[ride.id] = { wait: ride.wait_time, timestamp: now };

                        const predictedWait = Math.max(0, ride.wait_time + (velocity * 60));

                        return {
                            ...ride,
                            mu: Number(mu_eff.toFixed(1)),
                            lambda: Number(lambda.toFixed(1)),
                            rho: Number(rho.toFixed(2)),
                            velocity: Number(velocity.toFixed(2)),
                            predictedWait: Math.round(predictedWait),
                            routingScore: ride.wait_time - (predictedWait - ride.wait_time),
                            aiIntel: generateTacticalIntelligence(ride)
                        };
                    });

                    localStorage.setItem('dlp_history_v16', JSON.stringify(newHistory));
                    setRides(computedRides);
                    setLastSync(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    addLog(`[SYS] Engine processed ${computedRides.length} active variables. Queue histories cached.`, 'success');
                } catch (err) {
                    addLog(`[SYS] Boot failure: ${err.message}`, 'error');
                    if (!isSilent) setError(err.message);
                } finally {
                    if (!isSilent) setLoading(false);
                }
            };

            const memoizedData = useMemo(() => {
                if (rides.length === 0) return { itinerary: [], masterSequence: [], completedSequence: [], minorSequence: [], closedSequence: [], metrics: { queueEvasionSaved: 0, walkSaved: 0, totalSavedMins: 0, totalQueueTimeMins: 0 } };

                const completedSequence = [];
                const minorSequence = [];
                const closedSequence = [];
                const activePool = [];

                rides.forEach(r => {
                    if (activePark !== 'all' && r.parkId !== parseInt(activePark)) return;
                    if (completedTargets.has(r.id)) completedSequence.push(r);
                    else if (!r.is_open) closedSequence.push(r);
                    else if (r.isMinor && !activatedMinors.has(r.id)) minorSequence.push(r);
                    else activePool.push(r);
                });

                minorSequence.sort((a, b) => a.name.localeCompare(b.name));
                completedSequence.sort((a, b) => a.name.localeCompare(b.name));
                closedSequence.sort((a, b) => a.name.localeCompare(b.name));

                const grouped = {};
                activePool.forEach(ride => {
                    const zoneKey = `${ride.parkName} - ${ride.landName}`;
                    if (!grouped[zoneKey]) {
                        grouped[zoneKey] = { zoneKey, parkId: ride.parkId, parkName: ride.parkName, landName: ride.landName, rides: [], avgScore: 0 };
                    }
                    grouped[zoneKey].rides.push(ride);
                });

                Object.values(grouped).forEach(zone => {
                    zone.rides.sort((a, b) => a.routingScore - b.routingScore);
                    zone.avgScore = zone.rides.reduce((sum, r) => sum + r.routingScore, 0) / zone.rides.length;
                });

                let tspSortedLands = [];
                const parkGroups = {};
                Object.values(grouped).forEach(z => { if(!parkGroups[z.parkId]) parkGroups[z.parkId] = []; parkGroups[z.parkId].push(z); });

                Object.keys(parkGroups).forEach(pId => {
                   let unvisited = parkGroups[pId];
                   let currentPos = { x: 50, y: 95 }; 
                   
                   if (gpsEnabled && userGPS) {
                       let closestLand = null;
                       let minDistance = Infinity;
                       TACTICAL_COORDS[pId].forEach(land => {
                           const d = getHaversineDistance(userGPS.lat, userGPS.lng, land.lat, land.lng);
                           if (d < minDistance) { minDistance = d; closestLand = land; }
                       });
                       if (closestLand) currentPos = { x: closestLand.x, y: closestLand.y };
                   } else {
                       const completedArray = Array.from(completedTargets);
                       for (let i = completedArray.length - 1; i >= 0; i--) {
                           const lastRide = rides.find(r => r.id === completedArray[i]);
                           if (lastRide && lastRide.parkId.toString() === pId) {
                               currentPos = getCoords(pId, lastRide.landName); break; 
                           }
                       }
                   }

                   while(unvisited.length > 0) {
                      unvisited.forEach(zone => {
                         const dest = getCoords(pId, zone.landName);
                         const physicalDistance = Math.sqrt(Math.pow(dest.x - currentPos.x, 2) + Math.pow(dest.y - currentPos.y, 2));
                         const travelTimeMins = Math.max(2, Math.round(physicalDistance * 0.15)); 
                         
                         zone.travelTimeFromLast = travelTimeMins;
                         zone.tspCostScore = zone.avgScore + (travelTimeMins * 3.5); // 3.5x Stamina Penalty
                         zone.coords = dest;
                      });
                      
                      unvisited.sort((a,b) => a.tspCostScore - b.tspCostScore);
                      const nextZone = unvisited.shift();
                      tspSortedLands.push(nextZone);
                      currentPos = nextZone.coords; 
                   }
                });

                let sequence = [];
                let counter = 1;
                let tspTotalWalk = 0;
                let queueEvasionSaved = 0;
                let totalQueueTimeMins = 0;

                tspSortedLands.forEach(zone => {
                    tspTotalWalk += zone.travelTimeFromLast;
                    zone.rides.forEach(ride => {
                        sequence.push({ ...ride, globalStep: counter++, zoneInfo: zone });
                        totalQueueTimeMins += Math.round(ride.wait_time);
                        if (ride.velocity > 0) queueEvasionSaved += Math.round(ride.predictedWait - ride.wait_time);
                    });
                });

                let walkSaved = Math.round(tspTotalWalk * 0.8);
                let totalSavedMins = Math.round(walkSaved + queueEvasionSaved);

                return { 
                    itinerary: tspSortedLands, masterSequence: sequence,
                    completedSequence, minorSequence, closedSequence,
                    metrics: { queueEvasionSaved: Math.round(queueEvasionSaved), walkSaved, totalSavedMins, totalQueueTimeMins: Math.round(totalQueueTimeMins) }
                };
            }, [rides, activePark, completedTargets, activatedMinors, gpsEnabled, userGPS]);

            const { itinerary, masterSequence, completedSequence, minorSequence, closedSequence, metrics } = memoizedData;

            const RideCard = ({ ride, isCompleted, isMinor, isClosed, globalStep }) => {
                const isExpanded = expandedRideId === ride.id;
                const intel = ride.aiIntel;

                return (
                    <div className="relative group mb-3">
                        <div 
                            onClick={() => toggleExpand(ride.id)}
                            className={`flex items-center p-3 rounded-xl transition-all cursor-pointer border ${
                                isClosed ? 'bg-white dark:bg-[#080b12] border-rose-200 dark:border-rose-900/30' :
                                isCompleted ? 'bg-slate-100 dark:bg-[#080b12] border-slate-200 dark:border-slate-800 hover:bg-white dark:hover:bg-[#0c111a]' :
                                isMinor ? 'bg-slate-100 dark:bg-[#080b12] border-slate-200 dark:border-slate-800 hover:bg-white dark:hover:bg-[#0c111a]' :
                                ride.isPriority ? 'bg-emerald-50 dark:bg-emerald-900/10 border-emerald-200 dark:border-emerald-500/20 hover:border-emerald-400 dark:hover:border-emerald-500/50' : 
                                'bg-white dark:bg-[#0c111a] border-slate-200 dark:border-slate-800 hover:border-slate-400 dark:hover:border-slate-600'
                            } ${isExpanded ? 'rounded-b-none border-b-0' : ''}`}
                        >
                            {!isMinor && !isCompleted && !isClosed && (
                                <>
                                    <div className="absolute -left-8 top-1/2 w-8 h-[2px] bg-slate-300 dark:bg-slate-800 group-hover:bg-emerald-400 dark:group-hover:bg-emerald-500/50 transition-colors z-0 hidden md:block"></div>
                                    <div className={`absolute -left-[45px] top-1/2 -translate-y-1/2 w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shadow-lg transition-all z-10 hidden md:flex ${
                                        ride.isPriority ? 'bg-emerald-500 text-white dark:text-black border-2 border-white dark:border-[#05070a] scale-110 shadow-[0_0_10px_rgba(16,185,129,0.4)]' : 'bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-2 border-white dark:border-[#05070a]'
                                    }`}>
                                        {globalStep}
                                    </div>
                                </>
                            )}

                            <div className="mr-3 flex shrink-0">
                                {isClosed ? (
                                    <div className="w-5 h-5 rounded border border-rose-300 dark:border-rose-900/50 flex items-center justify-center bg-rose-100 dark:bg-rose-950/20">
                                        <Icon path={I.X} size={12} className="text-rose-500 dark:text-rose-500/50" />
                                    </div>
                                ) : (
                                    <input 
                                        type="checkbox" 
                                        checked={isCompleted || (!isMinor && !masterSequence.find(r=>r.id===ride.id) && !isCompleted)}
                                        onChange={(e) => isMinor ? toggleMinor(e, ride.id) : toggleRide(e, ride.id)}
                                        onClick={(e) => e.stopPropagation()}
                                        className={`w-5 h-5 rounded cursor-pointer bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700 ${isMinor ? 'accent-slate-500 dark:accent-slate-600' : 'accent-emerald-500'}`} 
                                    />
                                )}
                            </div>

                            <div className={`flex-grow min-w-0 pr-2 ${isCompleted ? 'opacity-50' : ''}`}>
                                <div className="flex items-center gap-2">
                                    <h4 className={`text-sm font-bold line-clamp-1 leading-tight ${
                                        isCompleted ? 'text-slate-500 line-through decoration-slate-400 dark:decoration-slate-600' : 
                                        isClosed ? 'text-slate-500 dark:text-slate-400' :
                                        ride.isPriority ? 'text-emerald-700 dark:text-emerald-50' : 'text-slate-700 dark:text-slate-200 group-hover:text-slate-900 dark:group-hover:text-white'
                                    }`}>
                                        {ride.name}
                                    </h4>
                                </div>
                                {ride.isPriority && !isCompleted && !isClosed && (
                                    <span className="inline-flex items-center gap-1 mt-1 text-[8px] font-black bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 px-1.5 py-0.5 rounded uppercase tracking-wider">
                                        <Icon path={I.Target} size={8} /> Priority Target
                                    </span>
                                )}
                                {(isCompleted || isMinor || isClosed) && (
                                    <p className="text-[9px] font-mono text-slate-500 dark:text-slate-600 uppercase mt-1 line-clamp-1">{ride.parkName} - {ride.landName}</p>
                                )}
                                {!isCompleted && !isMinor && !isClosed && (
                                    <div className="flex flex-col gap-1 mt-2">
                                        <div className="flex flex-wrap items-center gap-2 md:gap-3 text-[8px] font-mono text-slate-600 dark:text-slate-500 bg-white dark:bg-[#05070a] px-2 py-1.5 rounded border border-slate-200 dark:border-slate-800/50 w-fit shadow-sm dark:shadow-inner">
                                            <span title="Arrival Speed">λ: {ride.lambda}/m</span>
                                            <span className="text-slate-300 dark:text-slate-700">|</span>
                                            <span title="Ride Capacity">μ: {ride.mu}/m</span>
                                            <span className="text-slate-300 dark:text-slate-700">|</span>
                                            <span title="Traffic Intensity" className={ride.rho > 1.0 ? 'text-rose-500 dark:text-rose-400 font-bold bg-rose-100 dark:bg-rose-500/10 px-1 rounded' : 'text-emerald-600 dark:text-emerald-400 font-bold bg-emerald-100 dark:bg-emerald-500/10 px-1 rounded'}>
                                                ρ: {ride.rho}
                                            </span>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-col items-end justify-center shrink-0 ml-auto px-2">
                                {isClosed ? (
                                    <span className="text-rose-600 dark:text-rose-500 bg-rose-100 dark:bg-rose-500/10 px-2 py-1 rounded text-[10px] font-bold font-mono border border-rose-200 dark:border-transparent">CLOSED</span>
                                ) : (
                                    <>
                                        <div className="flex items-center gap-1 text-right mb-0.5">
                                            <div className={`font-black text-lg flex items-center gap-1 ${isCompleted ? 'text-slate-400 dark:text-slate-500' : ride.wait_time <= 30 ? 'text-emerald-600 dark:text-emerald-400' : ride.wait_time <= 60 ? 'text-amber-500 dark:text-amber-400' : 'text-rose-600 dark:text-rose-500'}`}>
                                                <Icon path={I.Timer} size={14} /> {Math.round(ride.wait_time)}
                                            </div>
                                            <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-tighter w-4">MIN</span>
                                        </div>
                                        {!isCompleted && !isMinor && (
                                            <div className={`text-[9px] flex items-center gap-0.5 font-mono font-bold ${ride.velocity > 0.1 ? 'text-rose-500 dark:text-rose-400' : ride.velocity < -0.1 ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-500 dark:text-slate-400'}`}>
                                                {ride.velocity > 0.1 ? <Icon path={I.TrendingUp} size={10} /> : ride.velocity < -0.1 ? <Icon path={I.TrendingDown} size={10} /> : <Icon path={I.Minus} size={10} />}
                                                PRED: {Math.round(ride.predictedWait)}m
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>

                        {isExpanded && (
                            <div className={`p-4 bg-slate-50 dark:bg-[#05070a] border border-t-0 rounded-b-xl animate-in slide-in-from-top-2 relative z-10 ${
                                isClosed ? 'border-rose-200 dark:border-rose-900/30' : ride.isPriority ? 'border-emerald-200 dark:border-emerald-500/20' : 'border-slate-200 dark:border-slate-800'
                            }`}>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="space-y-3">
                                        <div>
                                            <h5 className="text-[10px] text-emerald-600 dark:text-emerald-500 font-bold uppercase tracking-widest flex items-center gap-1 mb-1">
                                                <Icon path={I.Info} size={10} /> Tactical Briefing
                                            </h5>
                                            <p className="text-xs text-slate-600 dark:text-slate-300 leading-relaxed bg-white dark:bg-[#0c111a] p-2 rounded border border-slate-200 dark:border-slate-800 shadow-sm">
                                                {intel.brief}
                                            </p>
                                        </div>
                                        <div>
                                            <h5 className="text-[10px] text-blue-500 dark:text-blue-400 font-bold uppercase tracking-widest flex items-center gap-1 mb-1">
                                                <Icon path={I.Cpu} size={10} /> Operational Intel
                                            </h5>
                                            <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed bg-white dark:bg-[#0c111a] p-2 rounded border border-slate-200 dark:border-slate-800 shadow-sm">
                                                {intel.intel}
                                            </p>
                                        </div>
                                        <div className="flex gap-2 text-[9px] font-mono text-slate-500 uppercase tracking-wider mt-2">
                                            <span className="bg-slate-200 dark:bg-[#161b22] px-2 py-1 rounded">TYPE: {intel.type}</span>
                                            <span className="bg-slate-200 dark:bg-[#161b22] px-2 py-1 rounded">ENV: {intel.env}</span>
                                            <span className="bg-slate-200 dark:bg-[#161b22] px-2 py-1 rounded">EST: {intel.duration}</span>
                                        </div>
                                    </div>

                                    <div className="space-y-3 bg-white dark:bg-[#0c111a] p-3 rounded-lg border border-slate-200 dark:border-slate-800/50 shadow-inner">
                                        <h5 className="text-[10px] text-slate-500 font-bold uppercase tracking-widest flex items-center gap-1 mb-2 border-b border-slate-100 dark:border-slate-800 pb-1">
                                            <Icon path={I.BarChart} size={10} /> Live Diagnostics
                                        </h5>
                                        {!isClosed && ride.velocity !== undefined ? (
                                            <>
                                                <div>
                                                    <div className="flex justify-between text-[10px] font-mono mb-1">
                                                        <span className="text-slate-500 dark:text-slate-400">Current Vector</span>
                                                        <span className={ride.velocity > 0 ? 'text-rose-500 dark:text-rose-400' : 'text-emerald-600 dark:text-emerald-400'}>
                                                            60m Forecast: {Math.round(ride.predictedWait)}m
                                                        </span>
                                                    </div>
                                                    <div className="h-1.5 w-full bg-slate-100 dark:bg-[#05070a] rounded-full overflow-hidden relative border border-slate-200 dark:border-slate-800">
                                                        <div className="absolute top-0 left-0 h-full bg-slate-400 dark:bg-slate-500" style={{ width: `${Math.min(100, (ride.wait_time / 120) * 100)}%` }}></div>
                                                        {ride.velocity > 0 && (
                                                            <div className="absolute top-0 h-full bg-rose-400/50 dark:bg-rose-500/50" style={{ left: `${(ride.wait_time / 120) * 100}%`, width: `${Math.min(100, ((ride.predictedWait - ride.wait_time) / 120) * 100)}%` }}></div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 mt-3">
                                                    <div className="bg-slate-50 dark:bg-[#05070a] p-2 rounded border border-slate-200 dark:border-slate-800/50">
                                                        <span className="text-[8px] text-slate-500 uppercase block mb-1">Throughput (μ)</span>
                                                        <span className="text-xs text-slate-700 dark:text-slate-300 font-mono">{ride.mu} /m</span>
                                                    </div>
                                                    <div className="bg-slate-50 dark:bg-[#05070a] p-2 rounded border border-slate-200 dark:border-slate-800/50">
                                                        <span className="text-[8px] text-slate-500 uppercase block mb-1">Intensity (ρ)</span>
                                                        <span className={`text-xs font-mono font-bold ${ride.rho > 1 ? 'text-rose-500 dark:text-rose-400' : 'text-emerald-600 dark:text-emerald-400'}`}>{ride.rho}</span>
                                                    </div>
                                                </div>
                                            </>
                                        ) : <div className="py-4 text-center text-slate-400 text-xs font-mono">TELEMETRY OFFLINE</div>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const TacticalMap = () => {
                if (activePark === 'all') return null;
                const mapData = TACTICAL_COORDS[activePark];
                const parkItinerary = itinerary.filter(zone => zone.parkId.toString() === activePark);
                const routePoints = parkItinerary.map((zone, idx) => {
                    const coord = mapData.find(c => zone.landName.toLowerCase().includes(c.match));
                    return coord ? { ...coord, step: idx + 1 } : null;
                }).filter(Boolean);

                return (
                    <div className="relative w-full aspect-[4/3] bg-white dark:bg-[#05070a] rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-inner">
                        <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                            {routePoints.map((point, idx) => {
                                if (idx === routePoints.length - 1) return null;
                                const nextPoint = routePoints[idx + 1];
                                return (
                                    <g key={`line-${idx}`}>
                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} strokeWidth="2" className="stroke-slate-300 dark:stroke-slate-700" />
                                        <line x1={`${point.x}%`} y1={`${point.y}%`} x2={`${nextPoint.x}%`} y2={`${nextPoint.y}%`} stroke="#10b981" strokeWidth="2" className="route-path-animation" />
                                    </g>
                                );
                            })}
                        </svg>
                        {mapData.map((node, i) => {
                            const activeNode = routePoints.find(p => p.match === node.match);
                            return (
                                <div key={`node-${i}`} className="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center" style={{ left: `${node.x}%`, top: `${node.y}%` }}>
                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center font-black text-xs z-10 ${
                                        activeNode ? 'bg-emerald-500 border-emerald-300 text-white dark:text-black scale-110 shadow-md' : 'bg-slate-100 dark:bg-[#0f172a] border-slate-300 dark:border-slate-700 text-slate-400'
                                    }`}>
                                        {activeNode ? activeNode.step : '•'}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="min-h-screen text-slate-800 dark:text-slate-300 font-sans p-4 md:p-8 flex flex-col items-center pb-32">
                    <div className="w-full max-w-6xl">
                        
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-l-4 border-emerald-500 pl-6 py-2 bg-emerald-500/10 dark:bg-emerald-500/5 rounded-r-xl">
                            <div>
                                <h1 className="text-3xl font-black text-slate-900 dark:text-white tracking-tighter flex items-center gap-2">
                                    <Icon path={I.Navigation} size={32} className="text-emerald-600 dark:text-emerald-500" />
                                    DLP TOURING PLAN <span className="text-emerald-600/50 dark:text-emerald-500/50 text-sm font-mono">{buildHash}</span>
                                </h1>
                                <p className="text-xs font-mono text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mt-1">Unified Queue Logistics Engine</p>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-4 flex-wrap">
                                <button onClick={toggleGPS} className={`flex items-center gap-2 px-3 py-2 rounded-lg font-bold text-xs border ${gpsEnabled ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-300 dark:border-slate-700'}`}>
                                    <Icon path={I.MapPin} size={14} /> <span>GPS {gpsEnabled ? 'ON' : 'OFF'}</span>
                                </button>
                                <button onClick={cycleTheme} className="flex items-center gap-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-3 py-2 rounded-lg font-bold text-xs border border-slate-300 dark:border-slate-700">
                                    <Icon path={getThemeIcon()} size={14} /> <span>{theme.toUpperCase()}</span>
                                </button>
                                <button onClick={() => setShowPrimer(!showPrimer)} className="flex items-center gap-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-3 py-2 rounded-lg font-bold text-xs border border-slate-300 dark:border-slate-700">
                                    <Icon path={I.BookOpen} size={14} /> <span>MANUAL</span>
                                </button>
                                <button onClick={() => bootSystem(true)} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-2 rounded-lg font-bold text-xs border border-emerald-500">
                                    <Icon path={I.RefreshCw} size={14} /> <span>SYNC</span>
                                </button>
                            </div>
                        </header>

                        {showPrimer && (
                            <div className="mb-6 bg-white dark:bg-[#0c111a] border border-emerald-500/30 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-lg font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-4">Operational Manual</h2>
                                <p className="leading-relaxed">This terminal utilizes <strong>Live Data Delta Tracking</strong>. Every 5 minutes, the engine pulls the current queue times and compares them to the historic ledger cached on your device. By measuring the absolute difference between the old wait time and the new wait time, it calculates a mathematically precise Live Arrival Velocity ($\lambda$). It no longer guesses crowds based on the time of day; it responds directly to empirical data drops.</p>
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white dark:bg-[#0c111a] border border-slate-200 dark:border-slate-800 rounded-2xl p-5 shadow-sm">
                                    <div className="grid grid-cols-1 gap-2">
                                        {[{ id: '4', label: 'Disneyland Park' }, { id: '28', label: 'Disney Adventure World' }, { id: 'all', label: 'Full Resort' }].map(p => (
                                            <button key={p.id} onClick={() => setActivePark(p.id)} className={`text-left px-4 py-2 rounded-xl text-xs font-bold border flex justify-between items-center ${activePark === p.id ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-slate-50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300'}`}>
                                                {p.label} <Icon path={I.ChevronRight} size={14} />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white dark:bg-[#0c111a] border border-slate-200 dark:border-slate-800 rounded-2xl p-3 hidden md:block">
                                    <TacticalMap />
                                </div>
                            </div>

                            <div className="lg:col-span-3 space-y-6">
                                {loading ? <div className="text-center py-24">Parsing Topological Telemetry Data...</div> : (
                                    <div className="space-y-6">
                                        {masterSequence.length > 0 && (
                                            <div className="bg-white dark:bg-[#0c111a] rounded-2xl p-4 flex flex-col md:flex-row justify-between border border-slate-200 dark:border-slate-800 gap-4">
                                                <div className="flex gap-6">
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase">Est. Queue Time</p>
                                                        <h3 className="text-2xl font-black">{Math.floor(metrics.totalQueueTimeMins / 60)}H {metrics.totalQueueTimeMins % 60}M</h3>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] font-black text-slate-400 uppercase">Efficiency Saved</p>
                                                        <h3 className="text-2xl font-black text-emerald-500">{Math.floor(metrics.totalSavedMins / 60)}H {metrics.totalSavedMins % 60}M</h3>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="space-y-0 w-full">
                                            {masterSequence.map(ride => <RideCard key={ride.id} ride={ride} globalStep={ride.globalStep} />)}
                                        </div>

                                        {completedSequence.length > 0 && (
                                            <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                <h3 className="text-xs font-black uppercase mb-4 tracking-wider text-slate-400">Completed Archive</h3>
                                                {completedSequence.map(ride => <RideCard key={ride.id} ride={ride} isCompleted={true} />)}
                                            </div>
                                        )}

                                        {minorSequence.length > 0 && (
                                            <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                <h3 className="text-xs font-black uppercase mb-4 tracking-wider text-slate-400">All Other Attractions (Optional)</h3>
                                                {minorSequence.map(ride => <RideCard key={ride.id} ride={ride} isMinor={true} />)}
                                            </div>
                                        )}

                                        {closedSequence.length > 0 && (
                                            <div className="mt-8 border-t border-slate-200 dark:border-slate-800 pt-6">
                                                <h3 className="text-xs font-black uppercase mb-4 tracking-wider text-rose-500">Offline Attractions</h3>
                                                {closedSequence.map(ride => <RideCard key={ride.id} ride={ride} isClosed={true} />)}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* TERMINAL */}
                        <div className="mt-12 border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-[#0c111a] overflow-hidden">
                            <button onClick={() => setShowTerminal(!showTerminal)} className="w-full flex justify-between p-3 text-[10px] font-mono tracking-widest text-slate-400 uppercase">
                                <span>Network Daemon Logs</span> <span>[TOGGLE]</span>
                            </button>
                            {showTerminal && (
                                <div className="p-4 bg-slate-100 dark:bg-[#020408] h-48 overflow-y-auto font-mono text-[10px] terminal-scroll">
                                    {logs.map((log, i) => (
                                        <div key={i} className="flex gap-2 text-slate-500">
                                            <span>[{log.time}]</span> <span className={log.type === 'success' ? 'text-emerald-500' : ''}>{log.msg}</span>
                                        </div>
                                    ))}
                                    <div ref={logsEndRef} />
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
