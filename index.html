                    if (token === syncTokenRef.current) setGlobalTelemetryLog(activeLogs);
                    const allFetchedRides = [];
                    let parksOnline = 0;
                    const CURRENT_PARKS = GLOBAL_PARKS[activeRegion];
                    const now = Date.now();

                    for (const park of CURRENT_PARKS) {
                        try {
                            let data = null;
                            for (const proxy of PROXIES) {
                                try {
                                    addLog(`[NET] Engaging node: ${proxy.name} for ${park.name}...`, 'info');
                                    data = await proxy.fetch(`https://queue-times.com/parks/${park.id}/queue_times.json`);
                                    if (data && (data.lands || data.rides)) break;
                                } catch(e) { addLog(`[WARN] Node timeout/failure: ${e.message}`, 'warn'); }
                            }
                            if (!data || (!data.lands && !data.rides)) throw new Error("All network nodes isolated.");
                            let minsToClose = 999;
                            try {
                                const scheduleData = await fetchWithTimeout(`https://api.themeparks.wiki/v1/entity/${park.tpUuid}/schedule`);
                                const scheduleJson = JSON.parse(scheduleData);
                                if (scheduleJson && scheduleJson.schedule) {
                                    const activeSchedule = scheduleJson.schedule.find(s => s.type === "OPERATING" && new Date(s.closingTime).getTime() > now);
                                    if (activeSchedule) {
                                        minsToClose = (new Date(activeSchedule.closingTime).getTime() - now) / 60000;
                                    } else {
                                        minsToClose = -1;
                                    }
                                }
                            } catch(e) { addLog(`[WARN] Schedule extraction timeout.`, 'warn'); }
                            parksOnline++;
                            let rawRides = [];
                            if (data.lands) {
                                data.lands.forEach(land => {
                                    if (land.rides) {
                                        land.rides.forEach(r => rawRides.push({ ...r, landName: land.name }));
                                    }
                                });
                            }
                            if (data.rides) {
                                data.rides.forEach(r => rawRides.push({ ...r, landName: 'Park Grounds' }));
                            }
                            let freshTs = 0;
                            rawRides.forEach(r => {
                                const ts = Date.parse(r.last_updated);
                                if (ts && ts > freshTs) freshTs = ts;
                            });
                            rawRides.forEach(r => {
                                const pts = activeLogs[r.id];
                                if (!pts || pts.length < 2) return;
                                for (let i = pts.length - 1; i > 0; i--) {
                                    if (pts[i].w !== pts[i - 1].w) {
                                        if (pts[i].t > freshTs) freshTs = pts[i].t;
                                        break;
                                    }
                                }
                            });
                            let liveChange = false;
                            rawRides.forEach(r => {
                                const prev = prevWaitsRef.current[r.id];
                                if (prev !== undefined && prev !== r.wait_time) liveChange = true;
                                prevWaitsRef.current[r.id] = r.wait_time;
                            });
                            if (liveChange) feedChangeRef.current[park.id] = now;
                            if (feedChangeRef.current[park.id] && feedChangeRef.current[park.id] > freshTs) freshTs = feedChangeRef.current[park.id];
                            const parkDataAgeMins = freshTs > 0 ? Math.max(0, Math.round((now - freshTs) / 60000)) : null;
                            if (parkDataAgeMins !== null && parkDataAgeMins > 30) {
                                addLog(`[WARN] ${park.name}: no confirmed queue movement for ${parkDataAgeMins} mins. Values may lag reality.`, 'warn');
                            }
                            const processed = rawRides
                                .filter(r => r.name && !r.name.toLowerCase().includes('single rider'))
                                .map(r => {
                                    const isPriority = PRIORITY_RIDES.some(top => r.name.toLowerCase().includes(top.toLowerCase()));
                                    const coords = getCoords(park.id, r.landName);
                                    return {
                                        ...r,
                                        parkName: park.name,
                                        parkId: park.id,
                                        isPriority: isPriority,
                                        isMinor: !isPriority,
                                        coords: { x: coords.x, y: coords.y },
                                        duration: isPriority ? 5 : 3,
                                        uptime: 0.95,
                                        minsToClose: minsToClose,
                                        dataAgeMins: parkDataAgeMins
                                    };
                                });
                            allFetchedRides.push(...processed);
                        } catch (e) { addLog(`[ERR] ${park.name} completely isolated.`, 'error'); }
                    }
                    if (parksOnline === 0) throw new Error("No operational telemetry returned from endpoint nodes.");
                    // Filter out closed/0 rides from the global load factor so it remains accurate
                    const openRides = allFetchedRides.filter(r => r.is_open && r.wait_time > 0);
                    const totalWait = openRides.reduce((sum, r) => sum + r.wait_time, 0);
                    const liveResortLoadFactor = openRides.length > 0 ? (totalWait / openRides.length) : 15;
                    const computedRides = allFetchedRides.map(ride => {
                        let mu_base = ride.isPriority ? 25 : 15;
                        const n_name = ride.name.toLowerCase();
                        if (n_name.includes('phantom') || n_name.includes('pirates') || n_name.includes('buzz') || n_name.includes('small world') || n_name.includes('mansion')) {
                            mu_base = 33;
                        } else if (n_name.includes('crush') || n_name.includes('peter pan')) {
                            mu_base = 13;
                        }
                        const mu_eff = (ride.isPriority ? mu_base * 0.6 : mu_base) * (ride.uptime || 1);

                        // allPoints is already swept clear of zeros via normalizeTelemetry
                        const allPoints = activeLogs[ride.id] || [];
                        const currentTime = Date.now();
                        const ninetyMinsInMillis = 90 * 60 * 1000;
                        const windowPoints = allPoints.filter(p => (currentTime - p.t) <= ninetyMinsInMillis);
                        // Prevent zero-injection on active live syncs
                        if (ride.is_open && ride.wait_time > 0) windowPoints.push({ t: currentTime, w: ride.wait_time });
                        let velocity = 0;
                        const N = windowPoints.length;
                        if (N >= 2) {
                            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
                            const baseTime = windowPoints[0].t;
                            for (let i = 0; i < N; i++) {
                                const x = (windowPoints[i].t - baseTime) / 60000;
                                const y = windowPoints[i].w;
                                sumX += x;
                                sumY += y;
                                sumXY += (x * y);
                                sumXX += (x * x);
                            }
                            const numerator = (N * sumXY) - (sumX * sumY);
                            const denominator = (N * sumXX) - (sumX * sumX);
                            if (denominator !== 0) {
                                velocity = numerator / denominator;
                            } else {
                                velocity = 0;
                            }
                        } else {
                            const velocityRaw = (ride.wait_time - liveResortLoadFactor) / 120;
                            velocity = Math.max(-0.5, Math.min(0.5, velocityRaw));
                        }

                        velocity = Math.max(-2, Math.min(2, velocity));
                        let lambda = Math.max(0, mu_eff * (1 + velocity));
                        let rho = mu_eff > 0 ? lambda / mu_eff : 0;
                        const currentWait = ride.wait_time || 0;
                        const pred30Raw = Math.round(currentWait + (velocity * 30));
                        const pred60Raw = Math.round(currentWait + (velocity * 60));
                        const pred30 = Math.min(180, Math.max(0, pred30Raw));
                        const pred60 = Math.min(180, Math.max(0, pred60Raw));
                        let predDisplay = pred60;
                        if (ride.minsToClose <= 60 && ride.minsToClose > 0) predDisplay = "CLOSING";
                        else if (ride.minsToClose <= 0) predDisplay = "CLOSED";

                        const twentyFourHoursAgo = now - 86400000;
                        const todayPoints = allPoints.filter(p => p.t >= twentyFourHoursAgo);
                        // Baseline at 5 if closed, otherwise take live wait
                        const currentValidWait = ride.wait_time > 0 ? ride.wait_time : null;
                        let lowMarker = currentValidWait || 5;
                        let highMarker = currentValidWait || 5;
                        let avgMarker = currentValidWait || 5;
                        if (todayPoints.length > 0) {
                            const values = todayPoints.map(p => p.w);
                            if (currentValidWait) values.push(currentValidWait);
                            lowMarker = Math.min(...values);
                            highMarker = Math.max(...values);
                            avgMarker = Math.round(values.reduce((s, v) => s + v, 0) / values.length);
                        }

                        let bestHourStr = "Calibrating";
                        let worstHourStr = "Calibrating";
                        let timeSpanStr = "24 hours";
                        let hourlyCurve = null;
                        if (allPoints.length > 0) {
                            const todayDow = getParkDay(now, ride.parkId);
                            const hourlyMap = {};
                            const hourlyMapDow = {};
                            allPoints.forEach(p => {
                                const hr = getParkHour(p.t, ride.parkId);
                                // Ignore points logged outside plausible operating hours: even with
                                // zeros filtered, a frozen feed can echo stale NON-zero waits overnight,
                                // which would otherwise pollute the curve and "best hour".
                                if (hr < EARLIEST_PARK_HOUR) return;
                                if (!hourlyMap[hr]) hourlyMap[hr] = { sum: 0, count: 0 };
                                hourlyMap[hr].sum += p.w;
                                hourlyMap[hr].count++;
                                if (getParkDay(p.t, ride.parkId) === todayDow) {
                                    if (!hourlyMapDow[hr]) hourlyMapDow[hr] = { sum: 0, count: 0 };
                                    hourlyMapDow[hr].sum += p.w;
                                    hourlyMapDow[hr].count++;
                                }
                            });

                            // Day-of-week aware curve: a Saturday 14h is not a Tuesday 14h. Prefer
                            // same-weekday history once an hour has 3+ samples; else all-days average.
                            hourlyCurve = new Array(24).fill(null);
                            Object.keys(hourlyMap).forEach(h => {
                                const hh = Number(h);
                                const dow = hourlyMapDow[h];
                                hourlyCurve[hh] = (dow && dow.count >= 3) ? dow.sum / dow.count : hourlyMap[h].sum / hourlyMap[h].count;
                            });

                            let minAvg = Infinity;
                            let maxAvg = -Infinity;
                            Object.keys(hourlyMap).forEach(h => {
                                const avg = hourlyMap[h].sum / hourlyMap[h].count;
                                if (avg < minAvg) { minAvg = avg; bestHourStr = `${h.padStart(2, '0')}h`; }
                                if (avg > maxAvg) { maxAvg = avg; worstHourStr = `${h.padStart(2, '0')}h`; }
                            });
                            if (allPoints.length > 1) {
                                const diffDays = (allPoints[allPoints.length - 1].t - allPoints[0].t) / 86400000;
                                if (diffDays >= 1) timeSpanStr = `${Math.round(diffDays)} days`;
                            }
                        }

                        const trendGain = Math.max(-30, Math.min(60, pred60 - ride.wait_time));
                        const dealBonus = allPoints.length >= 8 ? Math.max(-20, Math.min(20, avgMarker - ride.wait_time)) : 0;
                        const priorityBonus = ride.isPriority ? 18 : 0;
                        const routingScore = (ride.wait_time * 0.6) - (trendGain * 1.2) - dealBonus - priorityBonus;

                        let routingReason = "Steady queue";
                        if (trendGain >= 10) routingReason = `Rising: +${Math.round(trendGain)}m expected within the hour`;
                        else if (trendGain <= -10) routingReason = `Easing: -${Math.round(Math.abs(trendGain))}m expected soon`;
                        else if (dealBonus >= 8) routingReason = `Bargain: ${Math.round(dealBonus)}m under its daily average`;
                        else if (dealBonus <= -8) routingReason = `Inflated: ${Math.round(Math.abs(dealBonus))}m over its daily average`;
                        else if (ride.isPriority) routingReason = "Priority target, queue steady";

                        return {
                            ...ride,
                            mu: Number(mu_eff.toFixed(1)),
                            lambda: Number(lambda.toFixed(1)),
                            rho: Number(rho.toFixed(2)),
                            velocity: Number(velocity.toFixed(2)),
                            predictedWait: predDisplay,
                            projection30m: pred30,
                            projection60m: pred60,
                            routingScore: routingScore,
                            routingReason: routingReason,
                            hourlyCurve: hourlyCurve,
                            curveSamples: allPoints.length,
                            aiIntel: generateTacticalIntelligence(ride),
                            analytics: { low: lowMarker, high: highMarker, avg: avgMarker, bestHour: bestHourStr, worstHour: worstHourStr, samples: allPoints.length, timeSpan: timeSpanStr }
                        };
                    });

                    if (token !== syncTokenRef.current) return;
                    setRides(computedRides);
                    setLastSync(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    setLastLiveSyncTime(new Date().toLocaleTimeString('en-GB', { hour12: false }));
                    addLog(`[CRON] Telemetry sync matrix compiled successfully.`, 'success');
                } catch (err) {
                    if (!isSilent) setError(err.message);
                    addLog(`[ERR] Background synchronization failure: ${err.message}`, 'error');
                } finally {
                    if (!isSilent) setLoading(false);
                }
            };

            const bootSystemRef = useRef(null);
            bootSystemRef.current = bootSystem;
            useEffect(() => {
                bootSystemRef.current();
            }, [activeRegion]);

            useEffect(() => {
                if (nextSyncSeconds === 0) {
                    setNextSyncSeconds(300);
                    bootSystemRef.current(true);
                }
            }, [nextSyncSeconds]);
            const telemetryStats = useMemo(() => {
                let oldest = Date.now();
                let newest = 0;
                let totalPoints = 0;
                const activeRegionParkIds = GLOBAL_PARKS[activeRegion].map(p => p.id);
                rides.forEach(r => {
                    if (activeRegionParkIds.includes(r.parkId)) {
                        const points = globalTelemetryLog[r.id] || [];
                        points.forEach(p => {
                            if (p.t < oldest) oldest = p.t;
                            if (p.t > newest) newest = p.t;
                            totalPoints++;
                        });
                    }
                });
                if (totalPoints === 0) return { daysLogged: 0, isReady: false };
                const days = Math.max(0.1, (newest - oldest) / 86400000);
                return { daysLogged: days, isReady: days >= 7 };
            }, [globalTelemetryLog, activeRegion, rides]);
            const forecastDaysRow = useMemo(() => {
                const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                const tzOffset = getTzOffsetMs(PARK_TZ[GLOBAL_PARKS[activeRegion][0].id] || 'UTC');
                const list = [];
                for (let i = 0; i < 7; i++) {
                    const future = new Date(Date.now() + tzOffset + (i * 86400000));
                    list.push({
                        index: i,
                        label: i === 0 ? "Today" : (i === 1 ? "Tomorrow" : dayNames[future.getUTCDay()]),
                        dateNum: future.getUTCDate()
                    });
                }
                return list;
            }, [activeRegion]);
            const calculatedForecastData = useMemo(() => {
                if (rides.length === 0 || !telemetryStats.isReady) return [];
                const tzOffset = getTzOffsetMs(PARK_TZ[GLOBAL_PARKS[activeRegion][0].id] || 'UTC');
                const targetDayOfWeek = new Date(Date.now() + tzOffset + (selectedForecastDay * 86400000)).getUTCDay();
                return rides.map(r => {
                    const points = globalTelemetryLog[r.id] || [];
                    const relevantPoints = points.filter(p => getParkDay(p.t, r.parkId) === targetDayOfWeek && getParkHour(p.t, r.parkId) >= EARLIEST_PARK_HOUR);
                    let calculatedAvg = 0;
                    let calculatedPeak = 0;
                    let trafficVerdict = "Insufficient Data";
                    if (relevantPoints.length > 0) {
                        const values = relevantPoints.map(p => p.w);
                        calculatedAvg = Math.round(values.reduce((a,b) => a+b, 0) / values.length);
                        calculatedPeak = Math.max(...values);
                        if (calculatedAvg > 45) trafficVerdict = "Very busy";
                        else if (calculatedAvg > 30) trafficVerdict = "Busy";
                        else trafficVerdict = "Moderate";
                    }
                    return { ...r, forecastAvg: calculatedAvg, forecastPeak: calculatedPeak, verdict: trafficVerdict };
                }).sort((a,b) => b.forecastAvg - a.forecastAvg);
            }, [rides, selectedForecastDay, globalTelemetryLog, telemetryStats.isReady, activeRegion]);
            const memoizedData = useMemo(() => {
                if (rides.length === 0) return { itinerary: [], masterSequence: [], completedSequence: [], minorSequence: [], closedSequence: [], metrics: { walkMins: 0, totalSavedMins: 0, totalQueueTimeMins: 0 } };
                const completedSequence = [];
                const minorSequence = [];
                const closedSequence = [];
                const activePool = [];
                rides.forEach(r => {
                    if (activePark !== 'all' && r.parkId !== parseInt(activePark)) return;
                    if (completedTargets.has(r.id)) completedSequence.push(r);
                    else if (!r.is_open) closedSequence.push(r);
                    else if (r.isMinor && !activatedMinors.has(r.id)) minorSequence.push(r);
                    else activePool.push(r);
                });
                minorSequence.sort((a, b) => a.name.localeCompare(b.name));
                completedSequence.sort((a, b) => a.name.localeCompare(b.name));
                closedSequence.sort((a, b) => a.name.localeCompare(b.name));
                const grouped = {};
                activePool.forEach(ride => {
                    const zoneKey = `${ride.parkName} - ${ride.landName}`;
                    if (!grouped[zoneKey]) {
                        grouped[zoneKey] = { zoneKey, parkId: ride.parkId, parkName: ride.parkName, landName: ride.landName, rides: [] };
                    }
                    grouped[zoneKey].rides.push(ride);
                });
                Object.values(grouped).forEach(zone => {
                    zone.rides.sort((a, b) => a.routingScore - b.routingScore);
                    zone.coords = getCoords(zone.parkId, zone.landName);
                });
                const parkBaseMins = {};
                GLOBAL_PARKS[activeRegion].forEach(p => {
                    const off = getTzOffsetMs(PARK_TZ[p.id] || 'UTC');
                    const d = new Date(Date.now() + off);
                    parkBaseMins[p.id] = d.getUTCHours() * 60 + d.getUTCMinutes();
                });
                const expectedWaitAt = (ride, dtMins) => {
                    const liveEst = Math.max(0, ride.wait_time + (ride.velocity || 0) * Math.min(dtMins, 90));
                    const curve = ride.hourlyCurve;
                    if (curve && ride.curveSamples >= 24) {
                        const base = parkBaseMins[ride.parkId] || 0;
                        const hist = curve[Math.floor(((base + dtMins) % 1440) / 60)];
                        if (typeof hist === 'number') {
                            const histNow = curve[Math.floor(base / 60)];
                            const calib = (typeof histNow === 'number' && histNow >= 5) ? Math.max(0.5, Math.min(2, ride.wait_time / histNow)) : 1;
                            const w = Math.max(0, Math.min(1, dtMins / 90));
                            return Math.min(240, (1 - w) * liveEst + w * hist * calib);
                        }
                    }
                    return Math.min(240, liveEst);
                };
                // ---- Timing-conflict land splitting ----
                // If a ride is expensive NOW but its history says it gets 15+ minutes cheaper
                // later today, don't force it into its land's first visit: split the land into
                // a first visit plus a deliberate RETURN visit, and let the optimizer place
                // the return at the cheap hour. Capped so exact search stays feasible.
                const landCountByPark = {};
                Object.values(grouped).forEach(z => { landCountByPark[z.parkId] = (landCountByPark[z.parkId] || 0) + 1; });
                const splitBudget = {};
                Object.keys(landCountByPark).forEach(pid => { splitBudget[pid] = Math.max(0, 7 - landCountByPark[pid]); });
                const zonesFinal = [];
                const splitCandidates = [];
                Object.values(grouped).forEach(zone => {
                    let nowRides = [], laterRides = [], maxSaving = 0;
                    if (zone.rides.length >= 2) {
                        zone.rides.forEach(r => {
                            let deferred = false;
                            if (r.hourlyCurve && r.curveSamples >= 24 && typeof r.minsToClose === 'number' && r.minsToClose > 180 && r.minsToClose < 900) {
                                const nearTerm = expectedWaitAt(r, 45);
                                let minLater = Infinity;
                                for (let t = 150; t <= r.minsToClose - 45; t += 30) {
                                    const w = expectedWaitAt(r, t);
                                    if (w < minLater) minLater = w;
                                }
                                const saving = nearTerm - minLater;
                                if (isFinite(minLater) && saving >= 15) {
                                    laterRides.push(r);
                                    if (saving > maxSaving) maxSaving = saving;
                                    deferred = true;
                                }
                            }
                            if (!deferred) nowRides.push(r);
                        });
                    }
                    if (laterRides.length > 0 && nowRides.length > 0) {
                        splitCandidates.push({ zone, nowRides, laterRides, saving: maxSaving });
                    } else {
                        zonesFinal.push(zone);
                    }
                });
                splitCandidates.sort((a, b) => b.saving - a.saving);
                splitCandidates.forEach(c => {
                    if (splitBudget[c.zone.parkId] > 0) {
                        splitBudget[c.zone.parkId]--;
                        zonesFinal.push({ ...c.zone, rides: c.nowRides });
                        zonesFinal.push({ ...c.zone, zoneKey: c.zone.zoneKey + ' (return)', rides: c.laterRides, isRevisit: true });
                    } else {
                        zonesFinal.push(c.zone);
                    }
                });
                let tspSortedLands = [];
                const parkGroups = {};
                zonesFinal.forEach(z => { if(!parkGroups[z.parkId]) parkGroups[z.parkId] = []; parkGroups[z.parkId].push(z); });
                const zoneTravelMins = (from, to, parkId) => {
                    // Prefer real measured walking minutes (DLP parks); grid estimate otherwise
                    const measured = lookupWalk(parkId, from && from.match, to && to.match);
                    if (measured !== null) return measured;
                    return Math.max(2, Math.round(Math.sqrt(Math.pow(to.x - from.x, 2) + Math.pow(to.y - from.y, 2)) * 0.15));
                };
                const simulatePlan = (zoneOrder, startPos, startClock) => {
                    let clock = startClock, pos = startPos;
                    let waitTotal = 0, walkTotal = 0, penalty = 0;
                    const details = [];
                    zoneOrder.forEach(zone => {
                        const walk = zoneTravelMins(pos, zone.coords, zone.parkId);
                        clock += walk; walkTotal += walk; pos = zone.coords;
                        zone.rides.forEach(ride => {
                            const mtc = typeof ride.minsToClose === 'number' ? ride.minsToClose : 999;
                            if (mtc > 0 && mtc < 900 && clock > mtc) {
                                penalty += ride.isPriority ? 120 : 30;
                                details.push({ id: ride.id, eta: clock, expWait: null, missed: true });
                                return;
                            }
                            const expWait = Math.round(expectedWaitAt(ride, clock));
                            waitTotal += expWait;
                            details.push({ id: ride.id, eta: clock, expWait: expWait, missed: false });
                            clock += expWait + (ride.duration || 4);
                        });
                    });
                    return { cost: waitTotal + walkTotal + penalty, waitTotal, walkTotal, clockEnd: clock, details };
                };
                // Evaluate a park's lands: returns the BEST order and the AVERAGE cost across
                // orderings. The average is what an unplanned/random day costs - the honest
                // baseline for the "saved" metric (the old walking-only baseline could match
                // the optimum by coincidence and misreport 0 saved).
                const evaluateZones = (zones, startPos, startClock) => {
                    if (zones.length === 0) return { bestOrder: [], bestCost: 0, avgCost: 0, avgTime: 0 };
                    if (zones.length === 1) {
                        const s = simulatePlan(zones, startPos, startClock);
                        return { bestOrder: zones.slice(), bestCost: s.cost, avgCost: s.cost, avgTime: s.waitTotal + s.walkTotal };
                    }
                    if (zones.length <= 7) {
                        let best = zones.slice(), bestCost = Infinity, sum = 0, sumTime = 0, cnt = 0;
                        const permute = (arr, m) => {
                            if (arr.length === 0) {
                                const s = simulatePlan(m, startPos, startClock);
                                sum += s.cost; sumTime += s.waitTotal + s.walkTotal; cnt++;
                                if (s.cost < bestCost) { bestCost = s.cost; best = m.slice(); }
                                return;
                            }
                            for (let i = 0; i < arr.length; i++) {
                                m.push(arr[i]);
                                permute(arr.slice(0, i).concat(arr.slice(i + 1)), m);
                                m.pop();
                            }
                        };
                        permute(zones, []);
                        return { bestOrder: best, bestCost: bestCost, avgCost: sum / cnt, avgTime: sumTime / cnt };
                    }
                    let pool = zones.slice(), order = [];
                    while (pool.length > 0) {
                        let bestIdx = 0, bestC = Infinity;
                        for (let i = 0; i < pool.length; i++) {
                            const c = simulatePlan(order.concat([pool[i]]), startPos, startClock).cost;
                            if (c < bestC) { bestC = c; bestIdx = i; }
                        }
                        order.push(pool.splice(bestIdx, 1)[0]);
                    }
                    let improved = true;
                    while (improved) {
                        improved = false;
                        for (let i = 0; i < order.length - 1; i++) {
                            const trial = order.slice();
                            const tmp = trial[i]; trial[i] = trial[i + 1]; trial[i + 1] = tmp;
                            if (simulatePlan(trial, startPos, startClock).cost < simulatePlan(order, startPos, startClock).cost) {
                                order = trial; improved = true;
                            }
                        }
                    }
                    let sum = 0, sumTime = 0;
                    const SAMPLES = 30;
                    for (let s = 0; s < SAMPLES; s++) {
                        const shuf = zones.slice();
                        for (let i = shuf.length - 1; i > 0; i--) {
